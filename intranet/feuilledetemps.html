function filtre(col){
	
	leBodyTableau = document.getElementById('tableauFdT').firstChild;
	str1="";
	totHeures=0;
//				alert(leBodyTableau.childNodes.length);
	for(var a=3; a<leBodyTableau.childNodes.length;a++)
	{
		
		
		try{
			if(leBodyTableau.childNodes[a].childNodes.length>col)
				if(leBodyTableau.childNodes[a].childNodes[col].firstChild.innerHTML!="DEV ")
					{
					str1+=leBodyTableau.childNodes[a].childNodes[2].firstChild.innerHTML;//eBodyTableau.childNodes[a].className;
					leBodyTableau.childNodes[a].className='ligneCache';
					//alert(str1);
					
					}
					else
					{
					if(leBodyTableau.childNodes[a].className!='ligneCache')
						if(!isNaN(leBodyTableau.childNodes[a].childNodes[1].firstChild.innerHTML))
							totHeures+=parseInt(leBodyTableau.childNodes[a].childNodes[1].firstChild.innerHTML);
					}
		}catch(err){alert(err+leBodyTableau.childNodes[a].childNodes[2].innerHTML);}
		
		}
		mTd=document.createElement('TD');
		mTd.innerHTML="Total affiché: "+totHeures;
		mTr=document.createElement('TR');
		mTr.appendChild(mTd);
		leBodyTableau.appendChild(mTr);
		
//				alert(str1);

}
