			function majChronos(){
			                         var d =new Date();
                                        
                         secs = d.getTime()-parseInt(window.infoMatch.chronoPer)-offset;
                        var d2 =new Date(secs);
                        lesSecs =window.dureePeriode*60-d2.getSeconds()-60*d2.getMinutes();
                        minutes=Math.floor(lesSecs/60);
                        secondes=lesSecs%60;
                        strMin=minutes>=0?minutes:0;
                        strSec=secondes>=0?secondes:0;
                        if(secondes<10){strSec="0"+strSec;}
                            mRT = retireTemps(window.infoMatch.chronoPer);
                            tempsOfficiel = parseInt(window.infoMatch.chronoPer)+mRT;
                           // alert(tempsOfficiel+"");
                             disc1 =window.dureePeriode*60000+tempsOfficiel;
                              var discr = (disc1)-d.getTime();//-window.offset*1000;
                        if(discr>0){
                            
                            var min =Math.floor(discr/60000);
                            var sec =Math.floor((discr/1000)%60);
                            strPun=sec<10?"0"+sec:sec;
                            document.getElementById('divChrono').innerHTML=min+":"+strPun;                         
//                        document.getElementById('divChrono').innerHTML=strMin+":"+strSec;
                        }else{
                        document.getElementById('divChrono').innerHTML="0:00";
                            
                        }
                        
                       
                        
                        punDom=new Array();
                        punVis=new Array();
                        var time = new Date();
                        var d = time.getTime();
                        
                        if(window.mesToggle[window.mesToggle.length-1].valeur==1
                            ||(window.mesToggle[window.mesToggle.length-1].valeur==0&&(window.dernMAJfait==false))
                            ||(d-dernMAJ>2000)
                        ){
                          window.dernMAJfait = false;    
                          dernMAJ=d;
                        for(var a=0;a<mesPuns.length;a++)
                        {
                  //          alert("Will...");
                          
                            mRT = retireTemps(mesPuns[a].chrono);
                            //alert(mRT+"");

                            tempsOfficiel = parseInt(mesPuns[a].chrono)+mRT;
                           // alert(tempsOfficiel+"");
                             disc1 = parseInt(mesPuns[a].duree)*60000+tempsOfficiel;
                              var discr = (disc1)-d;//-window.offset*1000;
                           //   console.log("equipe: "+mesPuns[a].equipeId+", discr:"+discr);
                            if(mesPuns[a].equipeId==window.eqIdDom)
                            {
                                if(discr>0)
                                {punDom.push(discr);}
                            }
                            else if(mesPuns[a].equipeId==window.eqIdVis)
                            {
                                if(discr>0)
                                {punVis.push(discr);}                                
                            }
                             window.dernMAJfait = true;
                            
                        }
                        $('#divPunDom').text("");
                        $('#divPunVis').text("");
                        if(punDom.length==0){
                            $('#contPunDom').hide("slow");
                        }else{
                            $('#contPunDom').show("fast");
                        }
                        if(punVis.length==0){
                            $('#contPunVis').hide("slow");
                        }else{
                            $('#contPunVis').show("fast");
                        }
                        for(var b=0;b<punDom.length;b++)
                        {
                            var min =Math.floor(punDom[b]/60000);
                            var sec =Math.floor((punDom[b]/1000)%60);
                            strPun=sec<10?"0"+sec:sec;
                            document.getElementById('divPunDom').innerHTML=min+":"+strPun;                         
                        }
                        for(var c=0;c<punVis.length;c++)
                        {
                            var min =Math.floor(punVis[c]/60000);
                            var sec =Math.floor((punVis[c]/1000)%60);
                            strPun=sec<10?"0"+sec:sec;
                            document.getElementById('divPunVis').innerHTML=min+":"+strPun;                         
                        }
                        
                        }
                        
            

			}
			//// Combien de millisecondes je dois enlever entre ce chrono et l'instant présent.
			////  Il faut trouver le plus récent off avant le chrono, sinon le plus ancien off après le chrono, 
			////  jusqu'au on suivant ou l'instant présent.
			function retireTemps(chrono){
			            var time = new Date();
                        var d = time.getTime();
                        trouve=false;
                        trouve2=false;
                        sommeTemps=0;
                        indDeb=-1;
                        indConsAnt=-1;
         //               alert(JSON.stringify(window.mesToggle));
//                        chronoDernierBasculeOff=-1;
  //                      chronoDernierBasculeOn=-1;
 //                       alert("A: "+mesToggle.length);
                for(var a=window.mesToggle.length-1;a>=0&&!trouve;a--){ ////  Il faut trouver le plus récent off avant le chrono
   //                   
//                  alert("A2: ");
                    if(window.mesToggle[a].chrono<chrono&&window.mesToggle[a].valeur==0){
                        trouve=true;
                        consigneAnterieure=window.mesToggle[a];
                        indConsAnt=a;
                        chronoDeb=chrono;
                            indDeb=a;
  //                      alert("B");
                    }
                }
                if(!trouve){    //sinon le plus ancien off après le chrono, 
                    for(var a=indConsAnt+1;a<window.mesToggle.length&&!trouve;a++)
                    {
                        if(window.mesToggle[a].valeur==0){
                            chronoDeb=window.mesToggle[a].chrono;
                            indDeb=a;
                            trouve2=true;
                            
    //                    alert("C");
                        }
                    }
                }
                        if(indDeb>=0){
                            bascule=false;
                            for(var a=indDeb;a<window.mesToggle.length;a++)
                            {
                            if(!bascule&&(window.mesToggle[a].valeur==1)){
                                sommeTemps+=window.mesToggle[a].chrono-chronoDeb; 
                                bascule=true;   
         //               alert("D");
                            }
                            if(bascule&&(window.mesToggle[a].valeur==0)){
                                chronoDeb=window.mesToggle[a].chrono; 
                                bascule=false;   
           //             alert("E");
                            }
                            
                            
                            }
                           // console.log("Commande actuelle: "+window.mesToggle[window.mesToggle.length-1].valeur);
                            if(window.mesToggle[window.mesToggle.length-1].valeur==0){
                                sommeTemps+=d-chronoDeb;
                          //      console.log("Le tableau est arrêté. chronoDeb: "+chronoDeb+" -- heure: "+" sommeTemps: " +sommeTemps);
                            }
                    }else{
                    //console.log("Pas de commande trouvée!");
                        
                    }
                    //console.log("Temps a retirer: "+mesToggle[mesToggle.length-1].valeur+" --- " + sommeTemps);
                return sommeTemps;
                
                
                
			    
			}
