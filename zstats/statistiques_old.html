			function extirpeSaison(id) {
				//			alert(window.vecEquipe.equipes.length);
				
				if (parseInt(window.ligueId) == 49 || parseInt(window.ligueId) == 50 || parseInt(window.ligueId) == 51) {

					var k = 0;
					while (k < window.window.cJSON.customClassement.saisons.length) {
					//					alert(window.vecEquipe.equipes.equipeId);
						if (id == window.window.cJSON.customClassement.saisons[k].saisonId) {
							return k;
						}
						k++;
					}
				} else {
					var k = 0;
					while (k < window.window.cJSON.saisons.length) {
					//					alert(window.vecEquipe.equipes.equipeId);
						if (id == window.window.cJSON.saisons[k].saisonId) {
							return k;
						}
						k++;
					}
				}
				
				return -1;
			}



			function discrDiff(a, b) {
				return parseInt(b.bp - b.bc) - parseInt(a.bp - a.bc);
			}

			function discrVic(a, b) {
				return parseInt(b.vicDom) + parseInt(b.vicVis) - parseInt(a.vicDom) - parseInt(a.vicVis);
			}

			function discrFiche(a, b) {

				ficheA = 0;
				ficheB = 0;
				strFiche = "";

				if (window.matchsDsSaison != undefined) {
					duels = new Array();
					for (var d = 0; d < window.matchsDsSaison.matchs.length; d++) {
						if ((window.matchsDsSaison.matchs[d].eqDomId == a.id && window.matchsDsSaison.matchs[d].eqVisId == b.id) || (window.matchsDsSaison.matchs[d].eqDomId == b.id && window.matchsDsSaison.matchs[d].eqVisId == a.id)) {
							duels.push(window.matchsDsSaison.matchs[d]);
						}
					}
					for (var e = 0; e < duels.length; e++) {
						if (duels[e].eqDomId == a.id) {
							if (parseInt(duels[e].equipeScoreDom) >= parseInt(duels[e].equipeScoreVis)) {
								if (duels[e].equipeScoreDom != duels[e].equipeScoreVis) {
									ficheA++;
									ficheA++;
								} else {
									ficheA++;
									ficheB++;
								}
							} else {
								ficheB++;
								ficheB++;
							}
							strFiche += duels[e].eqDom + ": " + duels[e].equipeScoreDom + " - " + duels[e].eqVis + ": " + duels[e].equipeScoreVis + " fiche A-B:" + ficheA + ficheB + "\n";
						}
						if (duels[e].eqVisId == a.id) {
							if (parseInt(duels[e].equipeScoreVis) >= parseInt(duels[e].equipeScoreDom)) {
								if (duels[e].equipeScoreVis != duels[e].equipeScoreDom) {
									ficheA++;
									ficheA++;
								} else {
									ficheA++;
									ficheB++;
								}
							} else {
								ficheB++;
								ficheB++;
							}
							strFiche += duels[e].eqDom + ": " + duels[e].equipeScoreDom + " - " + duels[e].eqVis + ": " + duels[e].equipeScoreVis + " fiche A-B:" + ficheA + ficheB + "\n";
						}
					}
					//		alert("fiche B:"+ficheB+" , ficheA: "+ficheA);
					//	alert(strFiche);

				}
				return ficheB - ficheA;
			}

								rangee = document.createElement('TR');
								rangee.id = "rangeeClasse_" + J;
								amettre = document.getElementById('rangeeTitreClassement' + '_div' + noDiv);
								amettre.parentNode.appendChild(rangee);

								var lesCols = new Array();
								lesCols[0] = equipes[J].nom;
								lesCols[2] = parseInt(equipes[J].vicDom) + parseInt(equipes[J].vicVis);
								lesCols[3] = parseInt(equipes[J].defDom) + parseInt(equipes[J].defVis);
								lesCols[4] = parseInt(equipes[J].nulDom) + parseInt(equipes[J].nulVis);
								lesCols[5] = parseInt(equipes[J].defPDom) + parseInt(equipes[J].defPVis);
								lesCols[1] = lesCols[2] + lesCols[3] + lesCols[4] + lesCols[5];
								basePoints = parseInt(2 * equipes[J].vicDom) + 2 * parseInt(equipes[J].vicVis) + parseInt(equipes[J].nulDom) + parseInt(equipes[J].nulVis);
								lesCols[6] = defP ? basePoints + parseInt(equipes[J].defPDom) + parseInt(equipes[J].defPVis) : basePoints;
								lesCols[7] = equipes[J].bp;
								lesCols[8] = equipes[J].bc;
								lesCols[9] = parseInt(equipes[J].bp) - parseInt(equipes[J].bc);

								if (parseInt(window.ligueId) == 49 || parseInt(window.ligueId) == 50 || parseInt(window.ligueId) == 51) {
									lesCols[6] = equipes[J].points;
								}

								var lesLiens = new Array();
								lesLiens[0] = '/zstats/statsequipe.html?equipeId=' + equipes[J].id + '&m=' + window.m;
								lesLiens[1] = null;
								lesLiens[2] = null;
								lesLiens[3] = null;
								lesLiens[4] = null;
								lesLiens[5] = null;
								lesLiens[6] = null;
								lesLiens[7] = null;
								lesLiens[8] = null;
								lesLiens[9] = null;

								for ( K = 0; K < lesCols.length; K++) {
									cellule = document.createElement('TD');
									if (lesLiens[K] != null) {
										lien = document.createElement('A');
										lien.innerHTML = lesCols[K];
										lien.href = lesLiens[K];
										cellule.appendChild(lien);
									} else {
										texte = document.createTextNode(lesCols[K]);
										cellule.appendChild(texte);
									}
									rangee.appendChild(cellule);
								}
								J % 2 == 0 ? rangee.className = 'lignePaire' : rangee.className = 'ligneImpaire';

							}

							//	document.body.rangee.cellule.innerHTML ='yo';
						} catch(err) {
						}
						if (!defP) {
							$(document).ready(function() {
								$('td:nth-child(6)').hide();
							});
						}

						break;

				}// Fin switch type saison

				//////////////////////////////////////////////////////////

			}

				window.idInter = setInterval(function() {
					rempliFiche((window.rang) % window.cJSON.saisons[extirpeSaison(saisonId)].equipe.length,saisonId);
				}, 5000);

			function rempliFiche(a,saisonId) {
				indiceSaison =extirpeSaison(saisonId);

				window.nomJS.innerHTML = window.cJSON.saisons[indiceSaison].equipe[a].nom;

				window.equipeJS.innerHTML = " ";
				var rangAff = (a + 1) % window.cJSON.saisons[indiceSaison].equipe.length == 0 ? window.cJSON.saisons[indiceSaison].equipe.length : (a + 1) % window.cJSON.saisons[indiceSaison].equipe.length;
				window.rangJS.innerHTML = '#' + rangAff;

				try {
					window.imgPFJS.src = "/admin/afficheImage.php?ficId=" + window.cJSON.saisons[indiceSaison].equipe[a].ficId;
				} catch(err) {
				}

				rangTr = 0;
				trouve = 0;
				lesTr = document.getElementsByTagName('TR');
				while (rangTr < lesTr.length && trouve == 0) {
					if (lesTr[rangTr].id == "rangeeClasse_" + a % window.cJSON.saisons[extirpeSaison(saisonId)].equipe.length) {
						if (window.bufClass != 0) {
							lesTr[rangTr - 1].className = window.bufClass;
						}
						window.bufClass = lesTr[rangTr].className;
						lesTr[rangTr].className = 'surligne';
						trouve = 1;
					}
					rangTr++;
				}

				document.getElementById('valeurStats_0').innerHTML = window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].vicDom + window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].vicVis;
				document.getElementById('valeurStats_1').innerHTML = window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].defDom + window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].defVis;

				document.getElementById('valeurStats_2').innerHTML = 2 * window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].vicDom + 2 * window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].vicVis + window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].nulDom + window.cJSON.saisons[extirpeSaison(saisonId)].equipe[a].nulVis;
				;
				//           alert(window.ligueId);

				//               document.getElementById('valeurStats_2').innerHTML =window.cJSON.saisons[document.getElementById("selSaison").selectedIndex].equipes[a].points;

				window.rang++;

			}
