    <!-- creating video Player -->    
	<script type='text/javascript'>
    
		jQuery(document).ready(function() {
			$('#media-video').videoPlayer({
				'playerWidth' : 1,
				'videoClass' : 'video'	
			});
		});
		
		function getInfoVid() {
                var requete_ajax = new XMLHttpRequest();
                var url = "/scriptsphp/getVideoUnique.php";
                var strVid = "videofile=" +getValue('videofile');
                params = strVid;
                url = url + "?" + params;
                requete_ajax.open('POST',url, true);
                requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded;charset=utf-8");
                requete_ajax.send(params);

                requete_ajax.onreadystatechange = function() {
                    if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

                        infoVid = eval('(' + requete_ajax.responseText + ')');
                        $('#rateSpan').text("RATING: "+infoVid.eval+" / 5");
                        $('#nbVuesSpan').text("Vue "+infoVid.nbVues+" fois");
                        
                        
                            
                            eval =getCookie('videoId_eval_' + infoVid.videoId);
                        if(eval!=null){
                            $('#rating-star').raty({ score:eval });
                        }else{
                        $('#rating-star').raty({
                          click: function(score, evt) {
                                                    $.post('/scriptsphp/evalueVid.php', {
                                                        videoId : infoVid.videoId,
                                                        eval :score
                                                    });
                                                    setCookie('videoId_eval_' + infoVid.videoId, score, 1000);
                              }
                        });
                            
                            
                        }
        


                    }
                }
            }

		
		
		
		
    </script>

	    <!-- custom scrolling list -->
	<script>

	         
		(function($){
			$(window).load(function(){
				
				$("a[rel='load-content']").click(function(e){
					e.preventDefault();
					var url=$(this).attr("href");
					$.get(url,function(data){
						$(".content .mCSB_container").append(data); //load new content inside .mCSB_container
						//scroll-to appended content 
						$(".content").mCustomScrollbar("scrollTo","h2:last");
					});
				});
				
				$(".content").delegate("a[href='top']","click",function(e){
					e.preventDefault();
					$(".content").mCustomScrollbar("scrollTo",$(this).attr("href"));
				});
				
			});
		})(jQuery);
		
		
	</script>
