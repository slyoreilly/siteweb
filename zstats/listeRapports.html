	function getNomArbitre(arbitreId)
	{
		for(var a=0;a<window.listeArbitres.length;a++)

				return "Non défini";
		
	}
	
	
	function getMoyenneTempsButs(MTB)
	{
		maString =MTB+'';
		
		//alert(maString);
		if(MTB==null)
			return	0;
			else{
		//mesButs=maString.split(",");
		mesButs = JSON.parse(MTB);
		somme=0;
		cpt=0;

		//alert(MTB+" "+mesButs);
		for(var a=0;a<mesButs.length;a++)
		{somme+=parseInt(mesButs[a]);
			cpt++;}
			if(cpt>0)
				return somme/cpt/1000;
			else
				return 0;
			}
		
	}
