			function selectOnglet(a) {
				for (var b = 0; b < window.vecTab.length; b++) {
					if (a == b) {
						document.getElementById(window.vecTab[a]).className = 'visible';
						document.getElementById('dTitre_' + a).className = 'titreOnglet actif';
					} else {
						document.getElementById(window.vecTab[b]).className = 'cache';
						document.getElementById('dTitre_' + b).className = 'titreOnglet passif';
					}
				}

			}

			function faitEntete() {

				divC = document.getElementById("divCentrale");
				divClass = document.createElement('DIV');
				divClass.className = "tabs";

				//			divC.appendChild(window.dSS);
				divC.appendChild(divClass);

				for (var a = 0; a < window.vecTab.length; a++) {
					sec1 = document.createElement('SECTION');
					sec1.id = window.vecTab[a];
					dTitre1JS = document.createElement('DIV');
					dTitre1JS.className = 'titreOnglet';
					dTitre1JS.id = 'dTitre_' + a;
					h2_1 = document.createElement('H2');
					frac = 100 / window.vecTab.length;

					dTitre1JS.onclick = (function(a) {
						return function() {
							selectOnglet(a);
						};
					})(a);

					dTitre1JS.style.width = frac + '%';

					divC.appendChild(sec1);
					divClass.appendChild(dTitre1JS);
					dTitre1JS.appendChild(h2_1);
				}

			}

}
};

				return requete_ajax.responseText;
			}

                    });
