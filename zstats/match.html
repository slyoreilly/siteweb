			function afficheSommairePunitions(rJSON) {
				var lesTitres = new Array();
				lesTitres[0] = window.tl_match_Equipe;
                lesTitres[1] = null;
				lesTitres[2] = window.tl_match_Joueur;
				lesTitres[3] = window.tl_match_Motif;
				lesTitres[4] = window.tl_match_Chrono;
				//div1 = document.getElementById('tabPun');
                if (window.vPerm < 19) {
                    //                  console.log(window.tl_match_Manque);
                    //                   console.log(window.tl_match_corrigePresence);
                    $('#tabPun').append($('<div></div>').attr("id", "admin_pun").append($('<h2 id="admin_title2"></h2>')));
                    $('#admin_title2').text("Admin Tools");
                    $('#admin_pun').append($('<div></div>').addClass("lien").text("Ajouter une punition").click(function() {
                        nouvellePun(1);
                    }));

                }

				//  div1.id = "divSommairePunitions";
				//  div1.className = "centrale";
				tb = document.createElement('TBODY');
				tb.id = "bodyTable";
				//lecorps = document.getElementById('divCentrale');
				table1 = document.createElement('TABLE');
				table1.id = "tableSommairePunitions";
				table1.className = "c_tableau";
				tr1 = document.createElement('TR');
				tr1.id = "date2";
				td1 = document.createElement('TD');
				td1.className = "titreTableau";
				td1.colSpan = lesTitres.length;
				td1.innerHTML = window.tl_match_titreTabPun;
				tr2 = document.createElement('TR');
				tr2.id = "rangeeTitreSommairePunitions";
				tr2.className = "rangeeTitreSommaire";
				for (var i = 0; i < lesTitres.length; i++) {
					tdi = document.createElement('TD');
					tdi.className = "rangeeTitre";
					tdi.innerHTML = lesTitres[i];
					tr2.appendChild(tdi);
				}

				tr1.appendChild(td1);
				tb.appendChild(tr1);
				tb.appendChild(tr2);
				table1.appendChild(tb);
				$('#tabPun').append($(table1));
//				div1.appendChild(table1);
				//  lecorps.appendChild(div1);

				/////////////////////////////////////////////////////////////

				////////////////////////////////////////////////////////////

				try
				{
				
	
					maPer = new Array();
					//rJSON.periodes.shift();

					if (rJSON.periodes.length > 0)
						maPer = rJSON.periodes[0];
					else {
						 if(rJSON.buts>0){
						maPer.chrono = rJSON.buts[0].chrono;
						}
						else{
							maPer.chrono =1560000000000;
						}

					}
					var Iper = 0;
				
					for (var J = 0; J < rJSON.punitions.length; J = J + 1) {

						try {
						
						
							var perStop = false;
							if (rJSON.periodes.length > 0) {
							
				
								while (Iper < rJSON.periodes.length && !perStop) {
								if (parseInt(rJSON.periodes[Iper].chrono) <  parseInt(rJSON.punitions[J].chrono)) {
									maPer = rJSON.periodes[Iper];
									perStop = ajoutePeriode(document.getElementById('rangeeTitreSommairePunitions').parentNode, rJSON.periodes[Iper].numero);
									Iper++;
									
									if (Iper < rJSON.periodes.length) {
										if (parseInt(rJSON.periodes[Iper].chrono) > parseInt(rJSON.punitions[J].chrono)) {
											perStop = true;
										}
									} else {

										perStop = true;
									}									
									
								} else {
									perStop = true;
								}

							}							
			
								
							}
						} catch(err) {
							if (vPerm < 10) {
								console.log(err);
								console.log(err.message + " Erreur dans sommaire punition");
							}
							}

						//  if(!statsJSON.joueurs[J].nom.isNull&&statsJSON.joueurs[J].nom!='Anonyme')
						//rangee = $('#rangeeTitreSommairePunitions').parent().append($('<TR></TR>').attr('id', 'tr_' + J));
						rangee = document.createElement('TR');
						rangee.setAttribute('id', 'tr_' + J);
						amettre = document.getElementById('rangeeTitreSommairePunitions');
						amettre.parentNode.appendChild(rangee);
						minutes = Math.floor((parseInt(rJSON.punitions[J].chrono) - parseInt(maPer.chrono)) / 60000);
						//  console.log("minutes"+minutes+" ");
						dizSecondes = Math.floor(((parseInt(rJSON.punitions[J].chrono) - parseInt(maPer.chrono)) - minutes * 60000) / 10000);
						secondes = Math.floor(((parseInt(rJSON.punitions[J].chrono) - parseInt(maPer.chrono)) - minutes * 60000 - dizSecondes * 10000) / 1000);
						//  console.log("secondes"+secondes+" ");
						strChrono = minutes + ":" + dizSecondes + secondes;
						mSrc = "";
						mSrc = (rJSON.eqDom == rJSON.punitions[J].equipe) ? '/admin/afficheImage.php?ficId=' + infoMatch.equipeFicIdDom : '/admin/afficheImage.php?ficId=' + infoMatch.equipeFicIdVis;

						var lesCols = new Array();
						try {
							lesCols[0] = '<img src=\"' + mSrc + '\" alt=\"' + rJSON.punitions[J].equipe + '\" width=\"32\" height=\"32\"\\/\>';
						} catch(err) {
							lesCols[0] = rJSON.punitions[J].equipe;
                        }
                        strImg = "<i onclick=corrigePunition(" + J + ") class=\"far fa-edit\" ></i>";

                        window.vPerm < 19 ? lesCols[1] = strImg : lesCols[1] = null;
						lesCols[2] = rJSON.punitions[J].joueur;
						lesCols[3] = rJSON.punitions[J].motif;
						lesCols[4] = strChrono;

						var lesLiens = new Array();
						lesLiens[0] = null;
						lesLiens[2] = '/zstats/statsjoueur.html?joueurId=' + rJSON.punitions[J].joueurId;
						lesLiens[3] = null;
						lesLiens[4] = null;

						for ( K = 0; K < lesCols.length; K++) {
							cellule = document.createElement('TD');
							if (lesCols[K] != undefined) {
								if (lesLiens[K] != null) {
									lien = document.createElement('A');
									lien.innerHTML = lesCols[K];
									lien.href = lesLiens[K];
									cellule.appendChild(lien);
								} else {
									ptexte = document.createElement('P');
									ptexte.innerHTML = lesCols[K];
									//                  texte = document.createTextNode(lesCols[K]);
									cellule.appendChild(ptexte);
								}
							}
							if (J % 2 == 0) {
								rangee.className += ' lignePaire';
							} else {
								rangee.className += ' ligneImpaire';
							}
							//J % 2 == 0 ? rangee.className = 'lignePaire' : rangee.className = 'ligneImpaire';
							//$('#tr_' + J).append($(cellule));

							//              J % 2 == 0 ? cellule.className = 'lignePaire' : cellule.className = 'ligneImpaire';
							rangee.appendChild(cellule);
						}

					}// fin du for des punitions
					while (Iper < rJSON.periodes.length) {
						//                  maPer = rSMB.periodes.shift();

						//          console.log(parseInt(rSMB.periodes[Iper].chrono)-parseInt(rSMB.buts[J].chrono)+" , Iper: "+Iper+", J: "+J);

						perStop = ajoutePeriode(document.getElementById('rangeeTitreSommairePunitions').parentNode, rJSON.periodes[Iper].numero);
						Iper++;

					}

					if (rJSON.punitions.length == 0) {
						rangee = document.createElement('TR');
						amettre = document.getElementById('rangeeTitreSommairePunitions');
						amettre.parentNode.appendChild(rangee);
						cellule = document.createElement('TD');
						cellule.colSpan = amettre.childNodes.length;
						rangee.appendChild(cellule);
						cellule.innerHTML = "Aucune punition";
						cellule.style.textAlign = "center";
					}

				} catch(err) {
					if (vPerm < 10) {
						console.log(err);
						console.log(err.message + " Erreur dans sommaire punition global");
					}
				}
				//////////////////////////////////////////////////////////

				//////////////////////////////////////////////////////////

			}

				//				requete_ajax.setRequestHeader("Content-length", params.length);
				//				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

					requete_ajax.onreadystatechange = function() {//Call a function when the state changes.

							statsJSON = eval('(' + requete_ajax.responseText + ')');

							window.etoileConditions++;
							if (window.etoileConditions >= 4) {
								afficheEtoiles();
							}

						}
					};
			}

			function setPresence(equipeId, joueurId, souscode) {

				var requete_ajax = new XMLHttpRequest();

				var url = "/scriptsphp/setGenerique.php";
				if (souscode > -1) {
					var valeur = {
						match_event_id : window.matchID,
						equipe_event_id : equipeId,
						joueur_event_ref : joueurId,
						code : 3,
						souscode : souscode,
						chrono : (new Date()).getTime(),
						noSequence : 0
					};
					var strTable = "table=TableEvenement0";
					var strValeur = "valeur=" + JSON.stringify(valeur);
					var strMode = "mode=creer";
					params = strTable + '&' + strValeur + '&' + strMode;

				} else {
					critere = " match_event_id='" + window.matchID + "' AND joueur_event_ref='" + joueurId + "' AND code=3";

					var strTable = "table=TableEvenement0";
					var strCritere = "critere=" + critere;
					var strMode = "mode=efface";
					params = strTable + '&' + strCritere + '&' + strMode;

				}

				requete_ajax.open('POST', url, true);
				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
						//console.log("WAIT FOR SHADOW!!");
						recalculeUnMatch();
						//						window.location.reload(true);
					}
				};
				requete_ajax.send(params);

			}

			$.makeTable = function(mydata) {
				var table = $('<table border=1>');
				var tblHeader = "<tr>";
				for (var k in mydata[0])
				tblHeader += "<th>" + k + "</th>";
				tblHeader += "</tr>";
				$(tblHeader).appendTo(table);
				$.each(mydata, function(index, value) {
					var TableRow = $("<tr></tr>");
					$.each(value, function(key, val) {

						$(TableRow).append($("<td></td>").text(val));
						if (key == "telId") {

							if (index % 2 == 0) {
								$(TableRow).addClass("lignePaire");
							} else {
								$(TableRow).addClass("ligneImpaire");
							}

						}
					});
					$(table).append(TableRow);

				});
				return ($(table));
			};
