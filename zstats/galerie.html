		<script type="text/javascript" charset="utf-8">

			function chargeListeImage(ligueId) {
				//return function() {
				var requete_ajax = new XMLHttpRequest();

				var url = "/scriptsphp/getListeImage.php";

				//	alert(url);
				var params = "proprio=" +ligueId + "&typeProprio=ligue";
				//		alert(params);
				requete_ajax.open('POST', url, true);

				//Send the proper header information along with the request
				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				//		alert('yo');
				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
					//		alert(requete_ajax.responseText);
					listeImage= eval('(' + requete_ajax.responseText + ')');
						for(J=0;J<listeImage.length;J++)
						{
												maDiv = document.createElement('DIV');
					maDiv.className = "divEquipe";
					maDiv.id = "divEquipe" + "_" + J;
					maDiv.style.padding = "5px";
					maDiv.style.margin = "10px";
					logoEquipe = document.createElement('IMG');
					logoEquipe.className = 'grosLogo';
					logoEquipe.id = "logoEquipe" + "_" + J;
					logoEquipe.src = '/admin/afficheImage.php?ficId=' + listeImage[J].ficId;
					logoEquipe.onclick=(function(J){return function(){afficheImage(J)};})(J);


					maDiv.appendChild(logoEquipe);

					document.getElementById("divCentrale").appendChild(maDiv);

							
						}
						
					}
				};
				requete_ajax.send(params);
			}


function afficheImage(selIm)
{

				frameModifJS.className = "affichePlein";
				//	frameModif.onload = function()

				var doc = frameModifJS.contentDocument || frameModifJS.contentWindow.document;

var cell = doc.body;

if ( cell.hasChildNodes() )

				var mIm = doc.createElement("IMG");

}
