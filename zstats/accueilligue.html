			function afficheVideos(type, mPage) {
				page=mPage;
				limit = 15;
				switch(type) {
					case 0:
					$('#corpsTabVidsTop .rangee').remove();
						for (var i = page * limit; i < window.videos.topVideos.length && i < limit * (page + 1); i++) {
							mDate = new Date(parseInt(window.videos.topVideos[i].chrono));
							mois = parseInt(mDate.getMonth()+1)<10?"0"+parseInt(mDate.getMonth()+1):parseInt(mDate.getMonth()+1);
							jour = parseInt(mDate.getDate())<10?"0"+parseInt(mDate.getDate()):parseInt(mDate.getDate());
							j1 =getJoueurDeJoueurId(window.videos.topVideos[i].tag1);
							joueur = j1!=null? j1.nom:"";
							
							$('#corpsTabVidsTop').append($('<div></div').attr("class", "cliquable rangee").append($('<div></div').text(mDate.getFullYear()+"-"+mois+"-"+jour),$('<div></div').text(joueur),  $('<div></div').text(window.videos.topVideos[i].eval)).on("click", {
								i : i
							}, function(event) {
								getSommaireMatchPourVideo(window.videos.topVideos[event.data.i].nomMatch, window.videos.topVideos[event.data.i]);
								$(this).css("cursor", "progress");
							}));

						}

						break;
					case 1:
					$('#corpsTabVidsPop .rangee').remove();
						var jVidsOk = page * limit;
						for (var i = page * limit; i < window.videos.popVideos.length && i < limit * (page + 1); i++) {
							while (parseInt(window.videos.popVideos[jVidsOk].angleOk) < 0 && jVidsOk < window.videos.popVideos.length) {
								jVidsOk++;
							}
							if (jVidsOk < window.videos.popVideos.length) {
								mDate = new Date(parseInt(window.videos.popVideos[jVidsOk].chrono));
							mois = parseInt(mDate.getMonth()+1)<10?"0"+parseInt(mDate.getMonth()+1):parseInt(mDate.getMonth()+1);
							jour = parseInt(mDate.getDate())<10?"0"+parseInt(mDate.getDate()):parseInt(mDate.getDate());
							j1 =getJoueurDeJoueurId(window.videos.popVideos[jVidsOk].tag1);
							joueur = j1!=null? j1.nom:"";
								$('#corpsTabVidsPop').append($('<div></div').attr("class", "cliquable rangee").append($('<div></div').text(mDate.getFullYear()+"-"+mois+"-"+jour),$('<div></div').text(joueur), $('<div></div').text(window.videos.popVideos[jVidsOk].nbVues)).on("click", {
									i : jVidsOk
								}, function(event) {
									getSommaireMatchPourVideo(window.videos.popVideos[event.data.i].nomMatch, window.videos.popVideos[event.data.i]);
									$(this).css("cursor", "progress");
								}));
								jVidsOk++;
							}
						}

						break;
					case 2:
										$('#corpsTabVidsNew .rangee').remove();

						for (var i = page * limit; i < window.videos.recentsVideos.length && i < limit * (page + 1); i++) {
							mDate = new Date(parseInt(window.videos.recentsVideos[i].chrono));
							mois = parseInt(mDate.getMonth()+1)<10?"0"+parseInt(mDate.getMonth()+1):parseInt(mDate.getMonth()+1);
							jour = parseInt(mDate.getDate())<10?"0"+parseInt(mDate.getDate()):parseInt(mDate.getDate());
							j1 =getJoueurDeJoueurId(window.videos.recentsVideos[i].tag1);
							joueur = j1!=null? j1.nom:"";
							$('#corpsTabVidsNew').append($('<div></div').attr("class", "cliquable rangee").append($('<div></div').text(mDate.getFullYear()+"-"+mois+"-"+jour),$('<div></div').text(joueur),  $('<div></div').text(jQuery.timeago(mDate))).on("click", {
								i : i
							}, function(event) {
								getSommaireMatchPourVideo(window.videos.recentsVideos[event.data.i].nomMatch, window.videos.recentsVideos[event.data.i]);
								$(this).css("cursor", "progress");
							}));
						}

						break;

				}

			}
			
			function getJoueurDeJoueurId(joueurId){
				for(var a=0; a<lesJoueurs.joueurs.length;a++){
					if(lesJoueurs.joueurs[a].id==joueurId)
						return lesJoueurs.joueurs[a];
				}
				return null;
			}

			function rempliTableau(messages) {
				//videNoeud('contBabillard');
				J0 = 0;
				Jf = messages.length;

				messages.sort(function(a, b) {

					d1Cal = a.dateEmission;

					var d1 = new Date(d1Cal.split("-")[0], d1Cal.split("-")[1], d1Cal.split("-")[2]);
					d2Cal = b.dateEmission;

					var d2 = new Date(d2Cal.split("-")[0], d2Cal.split("-")[1], d2Cal.split("-")[2]);

					//							var d1 = new Date(a.date);
					//							var d2 = new Date(b.date);
					return (d2 - d1)
				});

				nbMessageMax = 4;
				cptNbMesMax = 0;
				J = J0;
				while (J < Jf && cptNbMesMax < nbMessageMax) {

					//	if(!statsJSON.joueurs[J].nom.isNull&&statsJSON.joueurs[J].nom!='Anonyme')
					rangee = document.createElement('DIV');
					amettre = document.getElementById('contBabillard');
					amettre.appendChild(rangee);

					if (messages[J].parent == null) {
						monMes = document.createElement('div');
						monMes.className = "simpleMessage";
						monDate = document.createElement('div');
						monDate.className = "date";
						monDate.innerHTML = str2humain(messages[J].dateEmission);
						monNom = document.createElement('div');
						monNom.className = "nom";
						monNom.innerHTML = messages[J].expediteur;
						monCorps = document.createElement('div');
						monCorps.className = "corps";
						monCorps.innerHTML = messages[J].corps;
						var cpt = 0;
						for (var c = 0; c < messages.length; c++) {
							if (messages[c].parent == messages[J].messageId) {
								cpt++;
							}
						}
						nbCommentaire = document.createElement('div');
						nbCommentaire.className = 'option cliquable';
						nbCommentaire.innerHTML = (cpt > 1) ? cpt + ' commentaires' : cpt + ' commentaire';

						mCommentaire = document.createElement('div');
						mCommentaire.className = "lien";
						mCommentaire.innerHTML = 'Commenter';
						nbCommentaire.onclick = (function(J) {
							return function() {
								afficheFil(J);
							};
						})(J);

						/*				monMes.appendChild(document.createTextNode(' par: '));*/
						monMes.appendChild(monNom);
						monMes.appendChild(monCorps);
						monMes.appendChild(monDate);
						monMes.appendChild(nbCommentaire);

						//monMes.appendChild(mCommentaire);
						amettre.insertBefore(monMes, document.getElementsByTagName('textarea')[0]);
						cptNbMesMax++;
					}// fin du if est un post et non un comment.

					J++;
				}//Fin des rangées;

			}
