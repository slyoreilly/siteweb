            function rempliTableau(messages) {
                //videNoeud('contBabillard');
                J0 = 0;
                Jf = messages.length;

                messages.sort(function(a, b) {

                    d1Cal = a.dateEmission;

                    var d1 = new Date(d1Cal.split("-")[0], d1Cal.split("-")[1], d1Cal.split("-")[2]);
                    d2Cal = b.dateEmission;

                    var d2 = new Date(d2Cal.split("-")[0], d2Cal.split("-")[1], d2Cal.split("-")[2]);

                    //                          var d1 = new Date(a.date);
                    //                          var d2 = new Date(b.date);
                    return (d2 - d1)
                });

                nbMessageMax = 4;
                cptNbMesMax = 0;
                J = J0;
                while (J < Jf && cptNbMesMax < nbMessageMax) {

                    //  if(!statsJSON.joueurs[J].nom.isNull&&statsJSON.joueurs[J].nom!='Anonyme')

                        monDate.className = "date";
                        monDate.innerHTML = str2humain(messages[J].dateEmission);
                        monNom = document.createElement('div');
                        monNom.className = "nom";
                        monNom.innerHTML = messages[J].expediteur;
                        monCorps = document.createElement('div');
                        monCorps.className = "corps";

                        var cpt = 0;
                        for (var c = 0; c < messages.length; c++) {
                            if (messages[c].parent == messages[J].messageId) {
                                cpt++;
                            }
                        }
                        nbCommentaire = document.createElement('div');
                        nbCommentaire.className = 'option cliquable';
                        nbCommentaire.innerHTML = (cpt > 1) ? cpt + ' commentaires' : cpt + ' commentaire';

                        mCommentaire = document.createElement('div');

                        mCommentaire.innerHTML = 'Commenter';
                        nbCommentaire.onclick = (function(J) {
                            return function() {
                                afficheFil(J);
