			function extirpeEtoile(matchID,etoile){
				var k = 0;
				try{
				while (k < window.etoiles.length) {
					//				console.log(window.vecArbitres[k].arenaId);
					if (matchID == window.etoiles[k].nomMatch) {
						switch(etoile){
							case 1:
							return window.etoiles[k].etoile1;
							break;
							case 2:
							return window.etoiles[k].etoile2;
							break;
							case 3:
							return window.etoiles[k].etoile3;
							break;
							
						}
						return "";
					}
					k++;
				}
				return "";}
				catch(err){
				          if(window.Perm<9)
                           {   console.log(window.Perm+ " erreur dans extirpeEtoile");
                              console.log(err.message);}
				    return "";}
				
			}

			function filtreEquipe(mMatch, appellant) {
			    if(globalEquipeId!=null){
				if (globalEquipeId.length > 0) {
					//			        console.log(mMatch.eqDomId +" " + mMatch.eqVisId  +" " + mMatch.eqDom  +" " + mMatch.eqVis +" "  );
					//			        console.log(globalEquipeId==mMatch.eqDomId ||globalEquipeId==mMatch.eqVisId || globalEquipeId==mMatch.eqDom ||globalEquipeId==mMatch.eqVis);
					// Appellant ==1: Match déjà joué. Appellant ==2: Match à venir.
					if (appellant == 1) {
						if (globalEquipeId == mMatch.eqDomId || globalEquipeId == mMatch.eqVisId) {
							return true;
						} else {
							return false;
						}

					}
					if (appellant == 2) {
						//console.log(mMatch.eqDom  +" " + mMatch.eqVis +" "  );
						//console.log(globalEquipeId==mMatch.eqDom ||globalEquipeId==mMatch.eqVis);

						if (globalEquipeId == mMatch.eqDom || globalEquipeId == mMatch.eqVis) {
							return true;
						} else {
							return false;
						}

					}

				}}
				return true;
			}

			function defileFiches() {
				try {
					clearInterval(window.idInter);
				} catch(err) {
				          if(window.Perm<9)
                           {   console.log(window.Perm + "  erreur defileFiches");
                              console.log(err.message);}
				}
				idInter = setInterval(function() {
					cptLoc = 0
					ligne = (window.rang) % window.matchsDsSaison.length;
					while (document.getElementById('rangeeMatch_' + ligne).className == "ligneCache" && cptLoc < window.matchsDsSaison.length) {
						window.rang++;
						cptLoc++;
					}
					if (window.matchsDsSaison[window.rang % window.matchsDsSaison.length].etat == "termine") {
						rempliFicheTermine((window.rang) % window.matchsDsSaison.length);
                        $('#contFicheMAV').hide();
                        $('#contFicheMatch').show();
					}

					if (window.matchsDsSaison[window.rang % window.matchsDsSaison.length].etat == "avenir") {
						rempliFicheAvenir((window.rang) % window.matchsDsSaison.length);
						$('#contFicheMAV').show();
                        $('#contFicheMatch').hide();
					}

					//window.rang++;

				}, 3000);

			}
