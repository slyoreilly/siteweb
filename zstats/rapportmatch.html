	function getNomArbitre(arbitreId)
	{
		for(var a=0;a<window.listeArbitres.length;a++)
			{if(arbitreId==window.listeArbitres[a].arbitreId)
				return window.listeArbitres[a].prenom+" "+window.listeArbitres[a].nom}
				return "Non défini";
		
	}
	
	
	function getMoyenneTempsButs(MTB)
	{
		maString =MTB+'';
		if(MTB==null)
			return	0;
			else{
		mesButs=maString.split(",");
		somme=0;
		cpt=0;

		//alert(MTB+" "+mesButs);
		for(var a=0;a<mesButs.length;a++)
		{somme+=parseInt(mesButs[a]);
			cpt++;}
			if(cpt>0)
				return somme/cpt/1000;
			else
				return 0;
			}
		
	}
