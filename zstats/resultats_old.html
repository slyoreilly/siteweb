			function getInfoLigue(ligueId) {

								k++;
							}

							vecEquipe.Ligue.saisons.sort(function(a, b) {
								d1Cal = a.pm.split(" ")[0];
								d1Hor = a.pm.split(" ")[1];

								var d1 = new Date(d1Cal.split("-")[0], d1Cal.split("-")[1], d1Cal.split("-")[2], d1Hor.split(":")[0], d1Hor.split(":")[1], d1Hor.split(":")[2]);

							//statsJSONHome.joueurs.triPar("nbButs",1,1);

								if (vecEquipe.Ligue.saisons[K].nom != undefined) {

								}
								opt.value = vecEquipe.Ligue.saisons[K].saisonId;
								if (vecEquipe.Ligue.saisons[K].saisonId == maSai) { {
										opt.selected = "selected";
									}
								}
								if (K == vecEquipe.Ligue.saisons.length - 1 && maSai == "") {
									opt.selected = "selected";
									getMatchsdeLigueID(vecEquipe.Ligue.saisons[K].saisonId);
									getEtoiles(vecEquipe.Ligue.saisons[K].saisonId);
									loadConditions++;
									//alert(loadConditions);
								}
								selSaisonJS.appendChild(opt);
								/*vecEquipe.Saisons[K].joueurs.sort(function(a, b) {
								 return (parseInt(b.nbButs) + parseInt(b.nbPasses)) - (parseInt(a.nbButs) + parseInt(a.nbPasses))
								 });*/

				//	}

			function extirpeEtoile(matchID,etoile){
				var k = 0;
				try{
				while (k < window.etoiles.length) {
					//				alert(window.vecArbitres[k].arenaId);
					if (matchID == window.etoiles[k].nomMatch) {
						switch(etoile){
							case 1:
							return window.etoiles[k].etoile1;
							break;
							case 2:
							return window.etoiles[k].etoile2;
							break;
							case 3:
							return window.etoiles[k].etoile3;
							break;
							
						}
						return "";
					}
					k++;
				}
				return "";}
				catch(err){
				          if(window.Perm<9)
                           {   alert(window.Perm+ " erreur dans extirpeEtoile");
                              alert(err.message);}
				    return "";}
				
			}

					//			        alert(mMatch.eqDomId +" " + mMatch.eqVisId  +" " + mMatch.eqDom  +" " + mMatch.eqVis +" "  );
					//			        alert(globalEquipeId==mMatch.eqDomId ||globalEquipeId==mMatch.eqVisId || globalEquipeId==mMatch.eqDom ||globalEquipeId==mMatch.eqVis);
					// Appellant ==1: Match déjà joué. Appellant ==2: Match à venir.
					if (appellant == 1) {
						if (globalEquipeId == mMatch.eqDomId || globalEquipeId == mMatch.eqVisId) {
							return true;
						} else {
							return false;
						}

					}
					if (appellant == 2) {
						//alert(mMatch.eqDom  +" " + mMatch.eqVis +" "  );
						//alert(globalEquipeId==mMatch.eqDom ||globalEquipeId==mMatch.eqVis);

						if (globalEquipeId == mMatch.eqDom || globalEquipeId == mMatch.eqVis) {
							return true;
						} else {
							return false;
						}

					}

				}
				return true;
			}

			function defileFiches() {
				try {

				          if(window.Perm<9)
                           {   alert(window.Perm + "  erreur defileFiches");
                              alert(err.message);}
				}
				idInter = setInterval(function() {
					cptLoc = 0
					ligne = (window.rang) % window.matchsDsSaison.length;
					while (document.getElementById('rangeeMatch_' + ligne).className == "ligneCache" && cptLoc < window.matchsDsSaison.length) {
						window.rang++;
						cptLoc++;
					}
					if (window.matchsDsSaison[window.rang % window.matchsDsSaison.length].etat == "termine") {
						rempliFicheTermine((window.rang) % window.matchsDsSaison.length);
						window.contFicheMavJS.style.display = "none";
						window.contFicheMatchJS.style.display = "block";

					if (window.matchsDsSaison[window.rang % window.matchsDsSaison.length].etat == "avenir") {
						rempliFicheAvenir((window.rang) % window.matchsDsSaison.length);
						window.contFicheMavJS.style.display = "block";
						window.contFicheMatchJS.style.display = "none";
					}

					//window.rang++;

				}, 3000);

			}
