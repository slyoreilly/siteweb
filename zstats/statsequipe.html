	function getUnitesSpeciales(LigueID,saisonId)
	{
	var requete_ajax = new XMLHttpRequest();
	

				var url = "/stats2/unitesSpeciales2JSON.php";

				var strSaisonId = "saisonId=" + saisonId;
				var strLigueId = "ligueId=" + LigueID;
				params = strLigueId + '&' + strSaisonId;
				url = url + "?" + params;
				//requete_ajax.send(null);
				//	return requete_ajax.responseText;

				requete_ajax.open('POST', url, true);
				//				requete_ajax.send(null);

				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

	
	
	requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

						uJSON = eval('(' + requete_ajax.responseText + ')');
						afficheUnitesSpeciales();
				
					}
				}
//	alert(requete_ajax.responseText);
//	return requete_ajax.responseText;
	}

		function ficheClassement() {
			//window.statsJSONHome.Saisons[window.selSaison.selectedIndex].saisonId
			//alert(window.statsJSONHome.Saisons[window.selSaison.selectedIndex].saisonId);
			//alert(JSON.stringify(window.cJSON.saisons));
			maSai = trouveIndiceJson(window.cJSON.saisons, 'saisonId',window.statsJSONHome.Saisons[window.selSaison.selectedIndex].saisonId);
			monEq = trouveIndiceJson(window.cJSON.saisons[maSai].equipe, 'id', getValue('equipeId'));
			window.cJSON.saisons[maSai].equipe.sort(function(a, b) {
				return (parseInt(2 * b.vicDom) + 2 * parseInt(b.vicVis) + parseInt(b.nulDom) + parseInt(b.nulVis)) - (parseInt(2 * a.vicDom) + 2 * parseInt(a.vicVis) + parseInt(a.nulDom) + parseInt(a.nulVis));
			});
			//alert(JSON.stringify(window.cJSON.saisons[window.selSaison.selectedIndex].equipe));
			//alert(monEq);
			videNoeud('fiche');
			//alert(window.selSaison.selectedIndex);
			//alert(monEq);
			document.getElementById('fiche').innerHTML = window.tl_statseq_ficheVDN + parseInt(window.cJSON.saisons[maSai].equipe[monEq].vicDom + window.cJSON.saisons[maSai].equipe[monEq].vicVis) 
			+ " - " + parseInt(window.cJSON.saisons[maSai].equipe[monEq].defDom + window.cJSON.saisons[maSai].equipe[monEq].defVis) + " - " + parseInt(window.cJSON.saisons[maSai].equipe[monEq].nulDom 
				+ window.cJSON.saisons[maSai].equipe[monEq].nulVis) + " <br /> " + window.tl_meneurs_Rang+": " + parseInt(monEq + 1) + " sur " + parseInt(window.cJSON.saisons[maSai].equipe.length) 
				+ " equipes" + " <br /> " + " <br /> ";
		}
