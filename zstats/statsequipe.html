		function setPosition(joueurId, pos) {
			var requete_ajax = new XMLHttpRequest();

			var url = "/scriptsphp/setGenerique.php";

			var valeur = {
				position : pos
			};
			var strTable = "table=TableJoueur";
			var strValeur = "valeur=" + JSON.stringify(valeur);
			var strMode = "mode=modif";
			var strCrit = "critere='joueur_id=" + joueurId + "'";
			params = strTable + '&' + strValeur + '&' + strMode + '&' + strCrit;
			requete_ajax.open('POST', url, true);
			requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
			requete_ajax.setRequestHeader("Content-length", params.length);
			requete_ajax.setRequestHeader("Connection", "close");

			requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
				if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
					window.location.reload(true);
				}
			};
			requete_ajax.send(params);

		}

		function setMatchAVenir(match, reload) {

			$.ajax({
				url : "/stats2/setMatchAVenir.php",
				type : 'POST',
				data : jQuery.param({
					jDom : JSON.stringify(match.alDom),
					jVis : JSON.stringify(match.alVis),
					gDom : match.gDom,
					gVis : match.gVis,
					eqDom : match.eqDomId,
					eqVis : match.eqVisId,
					dateDeb : match.date,
					ligueId : window.ligueId,
					mavId : match.mavId,
					arbitreId : match.arbitre,
					arenaId : match.arenaId
				}),
				contentType : 'application/x-www-form-urlencoded; charset=UTF-8',
				success : function(response) {
					if(reload){
						window.location.reload(true);
					}else{
						faitBoiteProchain();
					}
				},
				error : function(xhr, status, error) {
					alert(err.Message + "  --  ereur enregistrement Match");
				}
			});
		}

		function ficheClassement() {

			//alert(JSON.stringify(window.cJSON.saisons));

		function setMatchs() {
			matchsPasses = new Array();
			matchsAvenir = new Array();
			for (var a = 0; a < lesMatchs.matchs.length; a++) {
				if (parseInt(lesMatchs.matchs[a].eqDomId) == parseInt(eJSON.Equipes[0].equipeId) || parseInt(lesMatchs.matchs[a].eqVisId) == parseInt(eJSON.Equipes[0].equipeId)) {
					if (lesMatchs.matchs[a].statut.length > 0) {
						matchsPasses.push(lesMatchs.matchs[a]);
					} else {
						var toPlace = new Date(lesMatchs.matchs[a].date);
						var asOfNow = new Date();
						if(toPlace.getTime()>=asOfNow.getTime()){
						matchsAvenir.push(lesMatchs.matchs[a]);}
					}
				}
			}

			matchsPasses.sort(function(a, b) {/// b-a: retourne le plus gros.
				return   (moment(b.date).diff(moment(a.date)));
			});
			matchsAvenir.sort(function(a, b) {/// b-a: retourne le plus gros.
				return   (moment(a.date).diff(moment(b.date)));
			});
			if (matchsAvenir.length > 0) {
				prochainMatch = matchsAvenir[0];
			} else {
				prochainMatch = null;
			}

			if (matchsPasses.length > 0) {
				dernierMatch = matchsPasses[0];
			} else {
				dernierMatch = null;
			}

		}
