			function afficheSommaireEval() {
				somme = 0;
				compteur = 0;
				window.loadConditions=0;
				detruitNoeud('divChiffre');
				detruitNoeud('conteneurEvaluation');
				divChiffre = document.createElement('P');
				$(divChiffre).attr("id","divChiffre");
				var evalParCritere=new Array();
				var nbEvalParCritere=new Array();
				 langue = (getCookie("langue")==undefined)?"fr":getCookie("langue");

				for (var a = 0; a < window.lesEvals.length; a++) {
					var bonCrit=-1;

					for (var b = 0; b < window.lesCriteres.length; b++) {
						if (window.lesCriteres[b].critereId == window.lesEvals[a].critereId) {
							echelleHaut = window.lesCriteres[b].echelleHaut;
							echelleBas = window.lesCriteres[b].echelleBas;
							bonCrit=b;
						}

					}
					somme += window.lesEvals[a].valeur / (echelleHaut - echelleBas);
					compteur++;
					if(bonCrit>-1){
						if(!$.isNumeric(nbEvalParCritere[bonCrit])){
							nbEvalParCritere[bonCrit]=0;
						}
						nbEvalParCritere[bonCrit]++;

						if(!$.isNumeric(evalParCritere[bonCrit])){
							evalParCritere[bonCrit] =0;
						}
					
						evalParCritere[bonCrit]  = (evalParCritere[bonCrit] + window.lesEvals[a].valeur / (echelleHaut - echelleBas))/nbEvalParCritere[bonCrit];
					}

				}
				if (compteur > 0) {
					divChiffre.innerHTML = Math.round(somme / compteur * 100);
				} else {
					divChiffre.innerHTML = "Pas d'évaluation";
				}

						$('#commentaireFiche').append($('<div></div>').attr("id","conteneurEvaluation"));
						$('#conteneurEvaluation').append($('<h3></h3>').text('Évaluation du joueur (%)'));
	
				document.getElementById('conteneurEvaluation').appendChild(divChiffre);
				
				for (var b = 0; b < window.lesCriteres.length; b++) {
						if(nbEvalParCritere[b]>0){
                            if (langue == "fr") {
                                $('#conteneurEvaluation').append($('<div></div>').addClass("titreCritere").text(window.lesCriteres[b].nom_fr));
                              }
                             if (langue == "en") {
                                $('#conteneurEvaluation').append($('<div></div>').addClass("titreCritere").text(window.lesCriteres[b].nom_en));
                            }
						
						$('#conteneurEvaluation')
							.append($('<div></div>').addClass("conteneurBarre")
								.append($('<div></div>').addClass("mesureBarre").css("width",Math.round(evalParCritere[b]*100)+"%").css("height","10px").hide())
							);
//						$('conteneurBarre:last-child div').show();
						}

					}
					$(":animated").promise().done(function() {
							$('.mesureBarre').show({duration:2000,queue:true});
   					});
				
				
			}

			function sauvegardeEval() {

				mesDivCrit = document.getElementById('listeCriteres').childNodes;

				for (var a = 0; a < mesDivCrit.length; a++) {
					critId = mesDivCrit[a].childNodes[1].id.split('_')[1];

					for (var b = 0; b < window.lesCriteres.length; b++) {
						if (window.lesCriteres[b].critereId == critId) {
							echelleHaut = parseInt(window.lesCriteres[b].echelleHaut);
							echelleBas = parseInt(window.lesCriteres[b].echelleBas);
						}

					}

					if ((mesDivCrit[a].childNodes[1].value.length > 0) && (parseInt(mesDivCrit[a].childNodes[1].value) >= echelleBas) && (parseInt(mesDivCrit[a].childNodes[1].value) <= echelleHaut)) {
						setEvaluation(critId);
					}

				}

				videNoeud('listeCriteres');
					getEvaluation();

			}

			function trouveEval(critereId) {

				for (var a = 0; a < lesEvals.length; a++) {
					if (lesEvals[a].critereId == critereId && window.usager.id == lesEvals[a].evaluateur) {
						return lesEvals[a].valeur;
					}

				}
				return "";
			}

			function afficheVideos(mPage) {
				page = mPage;
				limit = 15;
				$('#corpsTabVidsTop .rangee').remove();
				for (var i = page * limit; i < window.videos.topVideos.length && i < limit * (page + 1); i++) {
					mDate = new Date(parseInt(window.videos.topVideos[i].chrono));
					mois = parseInt(mDate.getMonth() + 1) < 10 ? "0" + parseInt(mDate.getMonth() + 1) : parseInt(mDate.getMonth() + 1);
					jour = parseInt(mDate.getDate()) < 10 ? "0" + parseInt(mDate.getDate()) : parseInt(mDate.getDate());
					if(i%2==0){
						parite="lignePaire";
					}
					else{
						parite="ligneImpaire";
					}
					
					$('#corpsTabVidsTop').append($('<div></div').attr("class", "cliquable rangee "+parite).append($('<div></div').text(mDate.getFullYear() + "-" + mois + "-" + jour), $('<div></div').text(window.videos.topVideos[i].eval)).on("click", {
						i : i
					}, function(event) {
						getSommaireMatchPourVideo(window.videos.topVideos[event.data.i].nomMatch, window.videos.topVideos[event.data.i]);
						
						$(this).css("cursor", "progress");
					}));

				}

			}
			function getSommaireMatchPourVideo(matchId, mStrV) {

				//				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

						rJSON = eval('(' + requete_ajax.responseText + ')');
						vidIndex=0;
						for(a=0;a<rJSON.buts.length;a++){
							for(b=0;b<rJSON.buts[a].video.length;b++){
								if(rJSON.buts[a].video[b].videoId==strV.videoId)

							}
						}	
						}
						
						//alert(JSON.stringify(mBut))
						getInfoVid(vidIndex, mBut);
						
					}
				};
			}
