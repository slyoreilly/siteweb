<script type="text/javascript">
function getMessages(receveur)
	{
		
		
		
						var requete_ajax = new XMLHttpRequest();

				var url = "/scriptsphp/getMessages.php";

				var strReceveurId = "userId=" + receveur;
				params = strReceveurId;
				requete_ajax.open('POST', url, true);
				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
											alert(requete_ajax.responseText);
			
								messages = eval('(' + requete_ajax.responseText + ')');
								rempliTableau(messages);
					}
				}

		
	}
	
	function okRepondre(no)
	{
		
		
		
						var requete_ajax = new XMLHttpRequest();

				var url = "/scriptsphp/sendMessage.php";

				var strExp = "expediteur=" + window.userId;
				var strRec = "recepteur=" + window.messages[no].expediteur;
				var strCorps = "corps=" + document.getElementById('iRep').value;
				var strTitre = "titre=" + 'RE: '+window.messages[no].titre;
				params = strExp +'&'+strRec +'&'+ strCorps +'&'+ strTitre;
				requete_ajax.open('POST', url, true);
				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
				//				alert(requete_ajax.responseText);
								lireMessage(no);
								
					}
				}

		
	}

	
	
	function lireMessage(no)
	{
		videNoeud('divLire');
		dLJS=document.getElementById('divLire');
		pLireJS = document.createElement('P');
		pLireJS.innerHTML = window.messages[no].corps;
		dLJS.appendChild(pLireJS);
	}

	function repondre(no)
	{
		videNoeud('divLire');
		dLJS=document.getElementById('divLire');
		iRepJS = document.createElement('INPUT');
		iRepJS.id='iRep';
		iRepJS.type = 'TEXT';
		iRepJS.style.width = "100%";
		iRepJS.style.height = "100px";
		iOKJS = document.createElement('INPUT');
		iOKJS.id='iOK';
		iOKJS.type = 'BUTTON';
		iOKJS.value='Envoyer';
		iOKJS.onclick=function (){okRepondre(no)};
		dLJS.appendChild(iRepJS);
		dLJS.appendChild(iOKJS);
		
	}

	
	function rempliTableau(messages){
		
						J0=0;
						Jf=messages.length;
		
							for ( J = J0; J <Jf ; J = J + 1) {

						//	if(!statsJSON.joueurs[J].nom.isNull&&statsJSON.joueurs[J].nom!='Anonyme')
						rangee = document.createElement('TR');
						amettre = document.getElementById('rangeeTitre');
						amettre.parentNode.appendChild(rangee);

						var lesCols = new Array();
						lesCols[0] = messages[J].expediteur;
						lesCols[1] = messages[J].dateEmission;
						lesCols[2] = messages[J].titre;
						lesCols[3] = "<img src=\"\/images\/icones\/view.png\" onclick=lireMessage("+J+"); width=\"32\" height=\"32\" alt=\"Edit\"\>"+"<img src=\"\/images\/icones\/reply.png\" onclick=repondre("+J+"); width=\"32\" height=\"32\" alt=\"Edit\"\>";

						var lesLiens = new Array();
						lesLiens[0] = null;
						lesLiens[1] = null;
						lesLiens[2] = null;
						lesLiens[3] = null;

						for ( K = 0; K < lesCols.length; K++) {
							cellule = document.createElement('TD');
							if (lesCols[K] != undefined) {
								if (lesLiens[K] != null) {
									lien = document.createElement('A');
		
									lien.innerHTML = lesCols[K];
									lien.href = lesLiens[K];
									cellule.appendChild(lien);
								} else {
									ptexte = document.createElement('P');
									ptexte.innerHTML = lesCols[K];
									//					texte = document.createTextNode(lesCols[K]);
									cellule.appendChild(ptexte);
								}
							}
							J % 2 == 0 ? cellule.className = 'lignePaire' : cellule.className = 'ligneImpaire';
							rangee.appendChild(cellule);
						}

					}//Fin des rangées;

		
	}

	
</script>
