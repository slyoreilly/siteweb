			function getRapport(dateInf, dateSup) {
				var requete_ajax = new XMLHttpRequest();

				var url = "/scriptsphp/getRapportVisites.php";

				params = "dateInf=" + dateInf + "&" + "dateSup=" + dateSup + "&" + "ligueId=" + window.ligueId;
				alert(params);
				requete_ajax.open('POST', url + "?" + params, true);
				//				requete_ajax.send(null);

				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

					}
				}
			}

			function afficheRapport() {
				parent = document.getElementById('divCentrale');
				btnActu = document.createElement('input');
				btnActu.type = 'BUTTON';
				btnActu.value = 'Liste des rapports';
				btnActu.onclick = function() {
					window.location.href = "/zstats/listeRapports.html"
				};
				parent.appendChild(btnActu);

				divDate = document.getElementById("date");
				divDate.appendChild(document.createTextNode(window.rapport.date));
				divArbitre = document.getElementById("arbitre");
				divArbitre.appendChild(document.createTextNode(getNomArbitre(window.rapport.arbitreId)));
				divMatch = document.getElementById("matchId");
				divMatch.appendChild(document.createTextNode(window.rapport.matchId));
				divTempsButs = document.getElementById("tempsButs");
				divTempsButs.appendChild(document.createTextNode(window.rapport.tempsButs));
				divBogues = document.getElementById("bogues");
				divBogues.appendChild(document.createTextNode(window.rapport.bogues));
				divBogues.style.display = "block";
				imgBogue = document.createElement('IMG');
				divBogues.appendChild(imgBogue);
				imgBogue.src = "/images/icones/edit.png";
				imgBogue.className = "petitLogo";
				imgBogue.alt = "Edit";
				imgBogue.onclick = function() {
					taBogue = document.createElement('TEXTAREA');
					taBogue.rows = "8";
					taBogue.cols = "40";
					taBogue.id = "taBogueId";
					taBogue.value = window.rapport.bogues;
					saveBogue = document.createElement('INPUT');
					saveBogue.type = "BUTTON";
					saveBogue.value = "Sauvegarder";
					saveBogue.onclick = function() {
						sauvegardeBogue();
					}
					inDivBogues = document.getElementById("bogues");
					inDivBogues.appendChild(taBogue);
					inDivBogues.appendChild(saveBogue);

				}
				divSatisfaction = document.getElementById("satisfaction");
				divSatisfaction.appendChild(document.createTextNode(window.rapport.evaluationMatchArbitre));

			}//Fin de la fonction;
