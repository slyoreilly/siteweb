<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Applique Logs</title>
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/style/general_v4.css" type="text/css" />

    <script src="http://ajax.aspnetcdn.com/ajax/jQuery/jquery-1.10.2.min.js"></script>
    <script src="/scripts/fonctions.js" type="text/javascript" charset="utf-8"></script>
    <script src="/scripts/constantes.js" type="text/javascript" charset="utf-8"></script>
    <script src="/scripts/affichage.js" type="text/javascript" charset="utf-8"></script>
    <script src="/scripts/afficheTableau.js" type="text/javascript" charset="utf-8"></script>

    <style>
        #zoneAppliqueLogs {
            max-width: 980px;
            margin: 16px auto;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
        }

        #blocCommande {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        #inputUrlLog {
            flex: 1;
            min-width: 320px;
            padding: 8px;
        }

        #resumeLogs ul {
            margin: 8px 0 0 18px;
        }

        #apercuLogs {
            margin-top: 12px;
            background: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 360px;
            overflow: auto;
        }

        .messageErreur {
            color: #b00020;
            font-weight: bold;
            margin-top: 10px;
        }

        #statutConnexion {
            margin: 0 0 12px 0;
            padding: 10px;
            background: #f1f5f9;
            border: 1px solid #d7e2ef;
            border-radius: 4px;
        }

        #statutConnexion p {
            margin: 0;
        }
    </style>

    <script type="text/javascript" charset="utf-8">
        gereLangue();

        function normaliseUrl(urlBrut) {
            var url = (urlBrut || '').trim();
            if (url === '') {
                return '';
            }

            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            return url;
        }

        function parseUrlMonitoring(url) {
            var regex = /^https?:\/\/(?:www\.)?syncstats\.com\/monitoring\/([^\/]+)\/([^\/]+)\/([^\/?#]+)$/i;
            var match = regex.exec(url);
            if (!match) {
                return null;
            }

            var fichierLog = match[3];
            var typeLog = null;
            var fichierLogLower = fichierLog.toLowerCase();

            if (fichierLogLower === 'bdlogfile.txt') {
                typeLog = 'BD caméra';
            } else if (fichierLogLower === 'synccamlog.txt') {
                typeLog = 'Batterie';
            } else if (fichierLogLower === 'logdbss.txt') {
                typeLog = 'BD télécommande';
            }

            return {
                telId: match[1],
                date: match[2],
                fichierLog: fichierLog,
                typeLog: typeLog
            };
        }

        function valideFormatMonitoring(url) {
            var infoUrl = parseUrlMonitoring(url);
            return infoUrl != null && infoUrl.typeLog != null;
        }

        function compteOccurences(texte, regex) {
            var match = texte.match(regex);
            return match ? match.length : 0;
        }

        function libelleEtatSync(etatSync) {
            var labels = {
                '2626': 'Erroné',
                '2323': 'Vidéo de base',
                '202': 'En cours de traitement',
                '1212': 'À téléverser',
                '1213': 'En ligne'
            };
            return labels[String(etatSync)] || ('État ' + etatSync);
        }

        function parseLigneBDCamera(ligne) {
            if (!/^CP:\s*/.test(ligne)) {
                return null;
            }

            var parts = ligne.split(' - ');
            if (parts.length < 8) {
                return null;
            }

            var idxLocalTxt = parts[0].replace(/^CP:\s*/, '').trim();
            var etatSyncTxt = parts[6].trim();
            var detailsJsonTxt = parts.slice(7).join(' - ').trim();

            var details = {};
            try {
                details = JSON.parse(detailsJsonTxt);
            } catch (e) {
                details = {};
            }

            var typeVideo = parseInt(details.type, 10);
            if (isNaN(typeVideo)) {
                typeVideo = 'inconnu';
            }

            var etatSync = parseInt(etatSyncTxt, 10);
            if (isNaN(etatSync)) {
                etatSync = etatSyncTxt;
            }

            return {
                idxLocal: idxLocalTxt,
                typeVideo: typeVideo,
                etatSync: etatSync
            };
        }

        function analyseBDCameraLog(texteBrut) {
            var lignes = (texteBrut || '').split(/\r?\n/);
            var stats = {
                lignesAnalysees: 0,
                lignesValides: 0,
                lignesInvalides: 0,
                types: {}
            };

            for (var i = 0; i < lignes.length; i++) {
                var ligne = lignes[i].trim();
                if (ligne === '') {
                    continue;
                }

                stats.lignesAnalysees++;
                var parsed = parseLigneBDCamera(ligne);
                if (parsed == null) {
                    stats.lignesInvalides++;
                    continue;
                }

                stats.lignesValides++;
                var typeKey = String(parsed.typeVideo);
                var etatKey = String(parsed.etatSync);

                if (stats.types[typeKey] == null) {
                    stats.types[typeKey] = { total: 0, etats: {} };
                }
                stats.types[typeKey].total++;

                if (stats.types[typeKey].etats[etatKey] == null) {
                    stats.types[typeKey].etats[etatKey] = 0;
                }
                stats.types[typeKey].etats[etatKey]++;
            }

            return stats;
        }

        function construitResume(texteBrut, contentType, urlFinale, infoUrl) {
            var texte = texteBrut || '';
            var lignes = texte === '' ? [] : texte.split(/\r?\n/);

            var summary = {
                url: urlFinale,
                telId: infoUrl.telId,
                date: infoUrl.date,
                typeLog: infoUrl.typeLog,
                fichierLog: infoUrl.fichierLog
            };

            return {
                summary: summary,
                analyseBDCamera: infoUrl.fichierLog.toLowerCase() === 'bdlogfile.txt' ? analyseBDCameraLog(texte) : null,
                apercu: lignes.slice(0, 25).join('\n')
            };
        }

        function afficheResume(resume) {
            var ul = $('<ul></ul>')
                .append($('<li></li>').text('URL analysée: ' + resume.summary.url))
                .append($('<li></li>').text('telId: ' + resume.summary.telId))
                .append($('<li></li>').text('Date: ' + resume.summary.date))
                .append($('<li></li>').text('Type de log: ' + resume.summary.typeLog + ' (' + resume.summary.fichierLog + ')'));

            var container = $('#resumeLogs').empty().append($('<h3></h3>').text('Résumé')).append(ul);

            if (resume.analyseBDCamera != null) {
                container.append($('<p></p>').text('BD caméra: ' + resume.analyseBDCamera.lignesValides + ' lignes valides sur ' + resume.analyseBDCamera.lignesAnalysees + ' analysées.'));

                var table = $('<table></table>').addClass('c_tableau');
                var thead = $('<thead></thead>').append(
                    $('<tr></tr>').append(
                        $('<th></th>').text('Type vidéo'),
                        $('<th></th>').text('ÉtatSync'),
                        $('<th></th>').text('Nombre')
                    )
                );
                var tbody = $('<tbody></tbody>');

                var typeKeys = Object.keys(resume.analyseBDCamera.types).sort(function(a, b) {
                    return parseInt(a, 10) - parseInt(b, 10);
                });

                for (var i = 0; i < typeKeys.length; i++) {
                    var typeKey = typeKeys[i];
                    var etats = resume.analyseBDCamera.types[typeKey].etats;
                    var etatKeys = Object.keys(etats).sort(function(a, b) {
                        return parseInt(a, 10) - parseInt(b, 10);
                    });

                    if (etatKeys.length === 0) {
                        tbody.append($('<tr></tr>').append(
                            $('<td></td>').text(typeKey),
                            $('<td></td>').text('-'),
                            $('<td></td>').text('0')
                        ));
                    } else {
                        for (var e = 0; e < etatKeys.length; e++) {
                            var etatKey = etatKeys[e];
                            tbody.append($('<tr></tr>').append(
                                $('<td></td>').text(typeKey),
                                $('<td></td>').text(libelleEtatSync(etatKey) + ' (' + etatKey + ')'),
                                $('<td></td>').text(etats[etatKey])
                            ));
                        }
                    }
                }

                table.append(thead).append(tbody);
                container.append(table);

                if (resume.analyseBDCamera.lignesInvalides > 0) {
                    container.append($('<p></p>').addClass('messageErreur').text('Lignes non reconnues: ' + resume.analyseBDCamera.lignesInvalides));
                }
            } else {
                container.append($('<p></p>').text('Le résumé spécialisé est actuellement disponible pour BDLogFile.txt seulement.'));
            }

            $('#apercuLogs').text(resume.apercu || '(aucune ligne)');
        }

        function executeAnalyseLogs() {
            $('#erreurLogs').empty();
            $('#resumeLogs').empty();
            $('#apercuLogs').empty();

            var urlNormalisee = normaliseUrl($('#inputUrlLog').val());
            if (urlNormalisee === '') {
                $('#erreurLogs').text('Veuillez entrer une URL.');
                return;
            }

            var infoUrl = parseUrlMonitoring(urlNormalisee);
            if (infoUrl == null || infoUrl.typeLog == null) {
                $('#erreurLogs').text('Format attendu: syncstats.com/monitoring/{telId}/{date}/{type de log} avec type parmi BDLogFile.txt, synccamlog.txt, logDBSS.txt.');
                return;
            }

            $('#btnExecuterLog').prop('disabled', true).val('Analyse...');

            $.ajax({
                url: urlNormalisee,
                type: 'GET',
                dataType: 'text'
            }).done(function (responseText, textStatus, jqXHR) {
                var contentType = jqXHR.getResponseHeader('Content-Type');
                var resume = construitResume(responseText, contentType, urlNormalisee, infoUrl);
                afficheResume(resume);
            }).fail(function (xhr, statusText) {
                var msg = 'Impossible de récupérer le log (' + statusText + ').';
                if (xhr && xhr.status) {
                    msg += ' HTTP ' + xhr.status + '.';
                }
                $('#erreurLogs').text(msg);
            }).always(function () {
                $('#btnExecuterLog').prop('disabled', false).val('Exécuter');
            });
        }

        function afficheStatutConnexion(vPerm) {
            var utilisateur = getCookie('userId');
            if (utilisateur == null || utilisateur === '') {
                utilisateur = 'non connecté';
            }

            var ligue = getCookie('ligueId');
            if (ligue == null || ligue === '') {
                ligue = getValue('ligueId');
            }
            if (ligue == null || ligue === '') {
                ligue = 'non définie';
            }

            $('#statutConnexion').empty().append(
                $('<p></p>').text('Statut de connexion — Utilisateur: ' + utilisateur + ' | Ligue: ' + ligue + ' | Niveau permission: ' + vPerm)
            );
        }

        function initialisePageAppliqueLogs() {
            try {
                faitEntete();
            } catch (e) {
            }

            var vPerm = verifiePermission();
            afficheStatutConnexion(vPerm);
            if (vPerm >= 10) {
                $('#zoneAppliqueLogs').hide();
                $('#messageDroit').text("Cette page est réservée à l'administration de la ligue en cours.");
                return;
            }

            $('#messageDroit').empty();
            $('#zoneAppliqueLogs').show();
            $('#btnExecuterLog').on('click', executeAnalyseLogs);
            $('#inputUrlLog').on('keypress', function (event) {
                if (event.which === 13) {
                    executeAnalyseLogs();
                }
            });
        }
    </script>
</head>
<body onload="initialisePageAppliqueLogs()">
<div id="divHaut"></div>
<div id="divGauche"></div>
<div id="divCentrale">
    <div id="statutConnexion"></div>

    <div id="zoneAppliqueLogs" style="display:none;">
        <h2>Applique Logs</h2>
        <p>Entrez une URL de monitoring pour obtenir un résumé rapide des logs.</p>

        <div id="blocCommande">
            <input id="inputUrlLog" type="text" placeholder="https://syncstats.com/monitoring/{telId}/{date}/{type de log}" />
            <input id="btnExecuterLog" type="button" value="Exécuter" />
        </div>

        <div id="erreurLogs" class="messageErreur"></div>
        <div id="resumeLogs"></div>
        <pre id="apercuLogs"></pre>
    </div>

    <div id="messageDroit" class="messageErreur"></div>
</div>
<div id="divDroite"></div>
</body>
</html>
