			function classeNom() {
					joueurs.sort(function(a, b) {
						return ((a.nomJoueur == b.nomJoueur) ? 0 : ((a.nomJoueur.toLowerCase() > b.nomJoueur.toLowerCase()) ? window.togouleNom : -window.togouleNom ));
					});
					window.togouleNom = -1 * window.togouleNom;
					//alert(JSON.stringify(joueurs));
					 $('tbody').empty();
					contenuTableau();
				
			};
		
			
			function classePosition() {
				
					window.joueurs.sort(function(a, b) {
						return ((a.position == b.position) ? 0 : ((a.position.toLowerCase() > b.position.toLowerCase()) ? window.togoulePos : -window.togoulePos ));
					});
					window.togoulePos = -1 * window.togoulePos;
					//alert(JSON.stringify(joueurs));
					 $('tbody').empty();
					contenuTableau();
				
			};

			function classeNo() {
					joueurs.sort(function(a, b) {
						return (window.togouleNo * (parseInt(b.noJoueur) - parseInt(a.noJoueur)));
					});
					window.togouleNo = -1 * window.togouleNo;
					//alert(JSON.stringify(joueurs));
					 $('tbody').empty();
					contenuTableau();
				
			};
			
			function classeParEquipes()
			{
			    equipeId=0;
					joueurs.sort(function(a, b) {
						return ((parseInt(a.equipeId)-equipeId)*(parseInt(a.equipeId)-equipeId)-(parseInt(b.equipeId)-equipeId)*(parseInt(b.equipeId)-equipeId));
					});
					 $('tbody').empty();
					contenuTableau();
				
				
			};

			function dessineTableau(jJSON2, cJSON) {

				pourMAJ = new Array();
				vecImg = new Array();

				joueurs = new Array();
				for (var I = 0; I < jJSON2.equipe.length; I = I + 1) {
					for ( K = 0; K < jJSON2.equipe[I].joueur.length; K = K + 1) {

						joueurs.push(jJSON2.equipe[I].joueur[K]);
						dernInd = joueurs.length - 1;
						joueurs[dernInd].equipeId = jJSON2.equipe[I].equipeId;
						joueurs[dernInd].nomEquipe = jJSON2.equipe[I].nomEquipe;
					}
				}


				togouleNom = 1;
				togouleNo = 1;
				togoulePos = 1;

				
///				if(jJSON2.equipe.length>1)
//				{
				
//				}
                 joueurs.sort(function(a, b) {

                    });
				

				contenuTableau(joueurs);
