			function verifUser(mUser) {

				var requete_ajax = new XMLHttpRequest();

							document.getElementById("contUser").appendChild(dDispoJS);
							window.saveOk=true;
	
						} else {
							dDispoJS=document.createElement('DIV');
							dDispoJS.id="dDispo";
							dDispoJS.className="formDroite";
							dDispoJS.innerHTML=tl_profil_userDispoP1+mUser+tl_profil_userDispoP3;
							dDispoJS.style.color="#8D2222";
							document.getElementById("contUser").appendChild(dDispoJS);
							window.saveOk=false;

							};
						}else
								{	btnEUJS.style.color="#444";

								};

		function verifForme(maForme)
	{
		
		var requete_ajax = new XMLHttpRequest();
		
		var url = "/admin/verifinscription.php";
		var params = "usager="+maForme.usager.value+"&prenom="+maForme.prenom.value+"&nom="+maForme.nom.value+"&pass="+maForme.pass.value+"&pass2="+maForme.pass2.value+"&codePostal="+maForme.codePostal.value+"&courriel="+maForme.courriel.value+"&code=1";
		requete_ajax.open("POST", url, true);

		//Send the proper header information along with the request
		requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
		requete_ajax.setRequestHeader("Content-length", params.length);
		requete_ajax.setRequestHeader("Connection", "close");

	
		requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
			if(requete_ajax.readyState == 4 && requete_ajax.status == 200) {
				strRepErreur = requete_ajax.responseText;
				//alert(strRepErreur);
				var repErreur = eval('(' +strRepErreur+')');
				
				if(repErreur.succes==1)
					{
					setCookie("userId",repErreur.usager,120);
					var person={id:repErreur.usager};
					//postwith("pageperso.php",person);
					//postwith("/zuser/login.html",person);
					//window.location.href="/zuser/bienvenueetmerci.html"
					window.location.href=window.menus[1].lien;
					}
					else
					{
//				alert("Echec");
						if(repErreur.erreurExist==1)
						{
							amettre2 = document.getElementById('pHaut');
							amettre2.innerHTML='Choisissez un autre identifiant!';
//				alert("id Exist");
						}
						if(repErreur.erreurPass==1)
						{	
							amettre2 = document.getElementById('pHaut');
							amettre2.innerHTML='Les mots de passes ne concordent pas!';
//				alert("mot de passe");
						}
					}
				
				
				}
		};
			requete_ajax.send(params);
	return requete_ajax.responseText;

//	alert(requete_ajax.responseText);


	}
