			function postwith(to, p) {
				//  alert(to);
				return function() {
					var myForm = document.createElement("form");
					myForm.method = "post";
					myForm.action = to;
					for (var k in p) {
						var myInput = document.createElement("input");
						myInput.setAttribute("name", k);
						myInput.setAttribute("value", p[k]);
						myInput.setAttribute("type", "hidden");
						myForm.appendChild(myInput);
					}
					document.body.appendChild(myForm);
					myForm.submit();
					document.body.removeChild(myForm);
				}
			}

			function remplirTableau(vecArena) {
				for ( J = 0; J < vecArena.length; J = J + 1) {
					//try{

					rangee = document.createElement('TR');
					amettre = document.getElementById('tabGesArena_tbody');
					amettre.appendChild(rangee);

					try {
						strImg = "<img src=\"\/images\/icones\/delete.png\" onclick=enleveArena(" + J + ") width=\"32\" height=\"32\" alt=\"Edit\"\>";

						var lesCols = new Array();
						lesCols[0] = vecArena[J].nomArena;
						lesCols[1] = vecArena[J].nomGlace;
						lesCols[2] = strImg;

					} catch(err) {
					}

					var lesLiens = new Array();
					lesLiens[0] = null;
					lesLiens[1] = null;
					lesLiens[2] = null;

					strCols = "";

					for ( K = 0; K < lesCols.length; K++) {
						cellule = document.createElement('TD');
						if (lesCols[K] != undefined) {
							if (lesLiens[K] != null) {
								lien = document.createElement('A');
								lien.innerHTML = lesCols[K];
								lien.href = lesLiens[K];
								cellule.appendChild(lien);
							} else {
								ptexte = document.createElement('P');
								ptexte.innerHTML = lesCols[K];
								//					texte = document.createTextNode(lesCols[K]);
								cellule.appendChild(ptexte);
							}
						}
						J % 2 == 0 ? cellule.className = 'lignePaire' : cellule.className = 'ligneImpaire';
						rangee.appendChild(cellule);
					}

				}

				rangeePlus2 = document.createElement('TR');
				cellPlus2 = document.createElement('TD');
				cellPlus2.colSpan = document.getElementById("tabGesArena_tbody").firstChild.childNodes.length;

				element2 = document.createElement('input');

				//Assign different attributes to the element.
				element2.type = "button";
				element2.value = "Ajouter une arena";

				element2.onclick = function(){getArena(0)};
				cellPlus2.appendChild(element2);
				rangeePlus2.appendChild(cellPlus2);
				amettre = document.getElementById('tabGesArena_tbody');
				amettre.appendChild(rangeePlus2);

			}
