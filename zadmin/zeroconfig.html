function sauvegardeEval(joueurId){
	
	mesDivCrit=document.getElementById('listeCriteres').childNodes;
	
	for(var a=0;a<mesDivCrit.length;a++)
	{
		critId=mesDivCrit[a].childNodes[1].id.split('_')[1];

		for(var b=0;b<window.lesCriteres.length;b++)
		{
			if(window.lesCriteres[b].critereId==critId)
			{echelleHaut=parseInt(window.lesCriteres[b].echelleHaut);
				echelleBas=parseInt(window.lesCriteres[b].echelleBas);}
			
		}

		if((mesDivCrit[a].childNodes[1].value.length>0)&&(parseInt(mesDivCrit[a].childNodes[1].value)>=echelleBas)&&(parseInt(mesDivCrit[a].childNodes[1].value)<=echelleHaut))
		{setEvaluation(critId,joueurId);}
		
	}
	
	
	videNoeud('listeCriteres');
	
}

			function getInfoEquipe(equipe){
				stats={nbAvant:0,nbDef:0,nbGardien:0,moyEval:0};
				nbEval=0;
				totalEval=0;
				for(i=0;i<equipe.joueur.length;i++)
				{
					if(equipe.joueur[i].position.substring(0,1).toLowerCase()=='a'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbAvant=stats.nbAvant+1;
						if(equipe.joueur[i].eval!=null)
						{nbEval++;
							totalEval+=parseFloat(equipe.joueur[i].eval);}
					}
					if(equipe.joueur[i].position.substring(0,1).toLowerCase()=='d'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbDef++;
						if(equipe.joueur[i].eval!=null)
						{nbEval++;
							totalEval+=parseFloat(equipe.joueur[i].eval);}
					}
					if(equipe.joueur[i].position.toLowerCase()=='g'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbGardien++;
						if(equipe.joueur[i].eval!=null)
						{nbEval+=3;
							totalEval+=3*parseFloat(equipe.joueur[i].eval);}
					}
					
				}
				stats.moyEval=10*totalEval/nbEval;
//				alert(totalEval+' '+JSON.stringify(stats));
				return stats;
				
			}

			function toggleJoueur(joueurOut, equipe, boiteOut) {
				return function() {
					presence = equipe.joueur[joueurOut].presence
					if (presence == 'remplace') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur.splice(joueurOut, 1)
								break;
							case 2:
								window.jsonEqVis.joueur.splice(joueurOut, 1)
								break;

						}
					} else if (presence == 'present') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur[joueurOut].presence = 'absent';
								break;
							case 2:
								window.jsonEqVis.joueur[joueurOut].presence = 'absent';
								break;

						}
					} else if (presence == 'absent') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur[joueurOut].presence = 'present';
								break;
							case 2:
								window.jsonEqVis.joueur[joueurOut].presence = 'present';
								break;

						}
					}
					boiteDomVis2(boiteOut, equipe);
					setMatchAVenir(false);

					//	alert(joueurIn);
				}
			}

			function getInfoEquipe(equipe){
				stats={nbAvant:0,nbDef:0,nbGardien:0,moyEval:0};
				nbEval=0;
				totalEval=0;
				for(i=0;i<equipe.joueur.length;i++)
				{
					if(equipe.joueur[i].position.substring(0,1).toLowerCase()=='a'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbAvant=stats.nbAvant+1;
						if(equipe.joueur[i].eval!=null)
						{nbEval++;
							totalEval+=parseFloat(equipe.joueur[i].eval);}
					}
					if(equipe.joueur[i].position.substring(0,1).toLowerCase()=='d'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbDef++;
						if(equipe.joueur[i].eval!=null)
						{nbEval++;
							totalEval+=parseFloat(equipe.joueur[i].eval);}
					}
					if(equipe.joueur[i].position.toLowerCase()=='g'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbGardien++;
						if(equipe.joueur[i].eval!=null)
						{nbEval+=3;
							totalEval+=3*parseFloat(equipe.joueur[i].eval);}
					}
					
				}
				stats.moyEval=10*totalEval/nbEval;
//				alert(totalEval+' '+JSON.stringify(stats));
				return stats;
				
			}
