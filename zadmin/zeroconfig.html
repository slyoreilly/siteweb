function sauvegardeEval(joueurId){
	
	mesDivCrit=document.getElementById('listeCriteres').childNodes;
	
	for(var a=0;a<mesDivCrit.length;a++)
	{
		critId=mesDivCrit[a].childNodes[1].id.split('_')[1];

		for(var b=0;b<window.lesCriteres.length;b++)
		{
			if(window.lesCriteres[b].critereId==critId)
			{echelleHaut=parseInt(window.lesCriteres[b].echelleHaut);
				echelleBas=parseInt(window.lesCriteres[b].echelleBas);}
			
		}

		if((mesDivCrit[a].childNodes[1].value.length>0)&&(parseInt(mesDivCrit[a].childNodes[1].value)>=echelleBas)&&(parseInt(mesDivCrit[a].childNodes[1].value)<=echelleHaut))
		{setEvaluation(critId,joueurId);}
		
	}
	
	
	videNoeud('listeCriteres');
	
}

function trouveEval(critereId){
	
	for(var a=0;a<lesEvals.length;a++)
	{
		if(lesEvals[a].critereId==critereId&&window.usager.id==lesEvals[a].evaluateur)
		{return lesEvals[a].valeur;}
		
	}
	return "";
}

			function evaluer(joueurId) {
//					alert('Doh');
					parent=document.getElementById('divDialogue');
					parent.className="visible";
					listeCrit = document.getElementById('listeCriteres');
					for(var a=0;a<lesCriteres.length;a++)
					{
						unJ = getJoueurDeJId(joueurId);
						contexteStr="joueur";
						if(unJ.position.toLowerCase()=='a'||unJ.position.toLowerCase()=='d')
						{contexteStr="joueur";}
						if(unJ.position.toLowerCase()=='g')
						{contexteStr="gardien";}
//						alert(lesCriteres[a].contexte);
						if(lesCriteres[a].contexte==contexteStr)
						{
						divSimpleCrit=document.createElement('DIV');
						divSimpleCrit.className="critere";	
						pA = document.createElement('P');
						pA.innerHTML=lesCriteres[a].nom_fr+ " : (" +lesCriteres[a].echelleBas+" à "+lesCriteres[a].echelleHaut+")";
						inA=document.createElement('INPUT');
						inA.type="text";
						inA.id="input_"+lesCriteres[a].critereId;
						inA.value=trouveEval(lesCriteres[a].critereId);
						//alert(lesCriteres[a].nom_fr);
						divSimpleCrit.appendChild(pA);

//						divSimpleCrit.appendChild(document.createElement('BR'));
						divSimpleCrit.appendChild(inA);
						
						listeCrit.appendChild(divSimpleCrit);
						}
					}
				}
			function construitEquipeDAlignement(tMavId) {
				//	return function(){
				var k = 0;
				boule = 0;
				//	alert("On construit!");
				while (k < window.vecMAV.length && boule == 0) {
					if (window.vecMAV[k].mavId == tMavId) {
						boule = 1;
					} else {
						k++;
					}
				}
				//					alert("Match non trouvé!");
				//	alert(JSON.stringify(window.cJSON));

				window.jsonEqDom = new Array();
				window.jsonEqVis = new Array();

				if (!boule && tMavId == -1) {
					window.jsonEqDom = JSON.parse(JSON.stringify(window.cJSON.equipe[0]));
					window.jsonEqVis = JSON.parse(JSON.stringify(window.cJSON.equipe[1]));
				} else {
					var iDom = 0;
					var iVis = 0;
					for ( i = 0; i < window.cJSON.equipe.length; i++) {
						if (window.vecMAV[k].eqDom == window.cJSON.equipe[i].equipeId) {
							window.jsonEqDom = JSON.parse(JSON.stringify(window.cJSON.equipe[i]));
							iDom = i;
						}
						if (window.vecMAV[k].eqVis == window.cJSON.equipe[i].equipeId) {
							window.jsonEqVis = JSON.parse(JSON.stringify(window.cJSON.equipe[i]));
							iVis = i;
						}
					}
				}

				//		alert("Equipes assignées!");
				var presence;
				var vM = JSON.parse(JSON.stringify(window.vecMAV));

				window.jsonEqDom.joueur = new Array();
				var m = 0;
				var dansAlign = false;
				//				alert(iDom);
				//				alert(JSON.stringify(window.cJSON.equipe[iDom]));

				while (m < window.cJSON.equipe[iDom].joueur.length) {
					var n = 0;
					dansAlign = false;
					while (n < vM[k].alignementDom.length && dansAlign == false) {
						if (vM[k].alignementDom[n] == window.cJSON.equipe[iDom].joueur[m].joueurId) {
							dansAlign = true;
							window.jsonEqDom.joueur.push(window.cJSON.equipe[iDom].joueur[m]);
							window.jsonEqDom.joueur[window.jsonEqDom.joueur.length - 1].presence = "present";
						}
						n++;
					}
					if (dansAlign == false) {
						window.jsonEqDom.joueur.push(window.cJSON.equipe[iDom].joueur[m]);
						window.jsonEqDom.joueur[window.jsonEqDom.joueur.length - 1].presence = "absent";
					}
					m++;
				}

				var n = 0;
				dansAlign = false;
				while (n < vM[k].alignementDom.length) {
					m = 0
					dansAlign = false;
					while (m < window.jsonEqDom.joueur.length && dansAlign == false) {
						if (vM[k].alignementDom[n] == window.jsonEqDom.joueur[m].joueurId) {
							dansAlign = true;
						}
						m++;
					}
					if (!dansAlign) {

						for ( j = 0; j < window.cJSON.equipe.length; j++) {
							m = 0;
							while (m < window.cJSON.equipe[j].joueur.length) {
								if (window.cJSON.equipe[j].joueur[m].joueurId == vM[k].alignementDom[n]) {
									window.jsonEqDom.joueur.push(window.cJSON.equipe[j].joueur[m]);
									window.jsonEqDom.joueur[window.jsonEqDom.joueur.length - 1].presence = "remplace";
								}
								m++;
							}
						}

					}
					n++;
				}
				//	strJDom=window.vecMAV[k].alignementDom;
				//////////////////////////////////  Fin Domicile, début visiteur.

				window.jsonEqVis.joueur = new Array();
				var m = 0;
				var dansAlign = false;
				while (m < window.cJSON.equipe[iVis].joueur.length) {
					var n = 0;
					dansAlign = false;
					while (n < vM[k].alignementVis.length && dansAlign == false) {
						if (vM[k].alignementVis[n] == window.cJSON.equipe[iVis].joueur[m].joueurId) {
							dansAlign = true;
							window.jsonEqVis.joueur.push(window.cJSON.equipe[iVis].joueur[m]);
							window.jsonEqVis.joueur[window.jsonEqVis.joueur.length - 1].presence = "present";
						}
						n++;
					}
					if (dansAlign == false) {
						window.jsonEqVis.joueur.push(window.cJSON.equipe[iVis].joueur[m]);
						window.jsonEqVis.joueur[window.jsonEqVis.joueur.length - 1].presence = "absent";
					}
					m++;
				}

				var n = 0;
				dansAlign = false;
				while (n < vM[k].alignementVis.length) {
					m = 0
					dansAlign = false;
					while (m < window.jsonEqVis.joueur.length && dansAlign == false) {
						if (vM[k].alignementVis[n] == window.jsonEqVis.joueur[m].joueurId) {
							dansAlign = true;
						}
						m++;
					}
					if (!dansAlign) {

						for ( j = 0; j < window.cJSON.equipe.length; j++) {
							m = 0;
							while (m < window.cJSON.equipe[j].joueur.length) {
								if (window.cJSON.equipe[j].joueur[m].joueurId == vM[k].alignementVis[n]) {
									window.jsonEqVis.joueur.push(window.cJSON.equipe[j].joueur[m]);
									window.jsonEqVis.joueur[window.jsonEqVis.joueur.length - 1].presence = "remplace";
								}
								m++;
							}
						}

					}
					n++;
				}

				//alert(JSON.stringify(window.jsonEqDom));
				//alert(JSON.stringify(window.jsonEqVis));

				//}

			function toggleJoueur(joueurOut, equipe, boiteOut) {
				return function() {
					presence = equipe.joueur[joueurOut].presence
					if (presence == 'remplace') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur.splice(joueurOut, 1)
								break;
							case 2:
								window.jsonEqVis.joueur.splice(joueurOut, 1)
								break;

						}
					} else if (presence == 'present') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur[joueurOut].presence = 'absent';
								break;
							case 2:
								window.jsonEqVis.joueur[joueurOut].presence = 'absent';
								break;

						}
					} else if (presence == 'absent') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur[joueurOut].presence = 'present';
								break;
							case 2:
								window.jsonEqVis.joueur[joueurOut].presence = 'present';
								break;

						}
					}
					boiteDomVis2(boiteOut, equipe);
					setMatchAVenir(false);

					//	alert(joueurIn);
				}
			}

			function getInfoEquipe(equipe){
				stats={nbAvant:0,nbDef:0,nbGardien:0,moyEval:0};
				nbEval=0;
				totalEval=0;
				for(i=0;i<equipe.joueur.length;i++)
				{
					if(equipe.joueur[i].position.substring(0,1).toLowerCase()=='a'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbAvant=stats.nbAvant+1;
						if(equipe.joueur[i].eval!=null)
						{nbEval++;
							totalEval+=parseFloat(equipe.joueur[i].eval);}
					}
					if(equipe.joueur[i].position.substring(0,1).toLowerCase()=='d'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbDef++;
						if(equipe.joueur[i].eval!=null)
						{nbEval++;
							totalEval+=parseFloat(equipe.joueur[i].eval);}
					}
					if(equipe.joueur[i].position.toLowerCase()=='g'&&(equipe.joueur[i].presence=='present'||equipe.joueur[i].presence=='remplace'))
					{stats.nbGardien++;
						if(equipe.joueur[i].eval!=null)
						{nbEval+=3;
							totalEval+=3*parseFloat(equipe.joueur[i].eval);}
					}
					
				}
				stats.moyEval=10*totalEval/nbEval;
//				alert(totalEval+' '+JSON.stringify(stats));
				return stats;
				
			}

							else if (a.nomJoueur == null)
								return 1;
							else
								return ((a.nomJoueur == b.nomJoueur) ? 0 : ((a.nomJoueur.toLowerCase() > b.nomJoueur.toLowerCase()) ? togouleNomAlt : -togouleNomAlt ));
						});

					}
				};
