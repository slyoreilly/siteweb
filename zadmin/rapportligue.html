	function getNomArbitre(arbitreId)
	{
		for(var a=0;a<window.listeArbitres.length;a++)
			{if(arbitreId==window.listeArbitres[a].arbitreId)
				return window.listeArbitres[a].prenom+" "+window.listeArbitres[a].nom}
				return "Non défini";
		
	}
	
	
	function getMoyenneTempsButs(MTB)
	{
		maString =MTB+'';
		if(MTB==null)
			return	0;
			else{
		mesButs=maString.split(",");
		somme=0;
		cpt=0;

		//alert(MTB+" "+mesButs);
		for(var a=0;a<mesButs.length;a++)
		{somme+=parseInt(mesButs[a]);
			cpt++;}
			if(cpt>0)
				return somme/cpt/1000;
			else
				return 0;
			}
		
	}

    $.makeTable = function (mydata) {
    var table = $('<table border=1>');
    var tblHeader = "<tr>";
    for (var k in mydata[0]) tblHeader += "<th>" + k + "</th>";
    tblHeader += "</tr>";
    $(tblHeader).appendTo(table);
    $.each(mydata, function (index, value) {
        var TableRow =$("<tr></tr>");
        $.each(value, function (key, val) {

        
        $(TableRow).append($("<td></td>").text(val));
              if(key=="telId"){
                  $(TableRow).on("click", function(){
                      
                      window.location.href="/zadmin/interfaceAppareil.html?telId="+val;
                      })
        
                      if(index%2==0){
                  $(TableRow).addClass("lignePaire");
              }else{
                  $(TableRow).addClass("ligneImpaire");
              }

            }
        });
        $(table).append(TableRow);
        
    });
    return ($(table));
    };
	
	function sortResultats(vecteur,prop, asc){
		
		vecteur = vecteur.sort(function(a,b){
			if(asc){
			return (a[prop]>b[prop])?1:((a[prop]<b[prop])?-1:0);	
				
			}
			else{
				return (b[prop]<a[prop])?1:((b[prop]<a[prop])?-1:0);	
			
			}
			
		});
	}
	
	function formatDate(date) {
    var d = new Date(date),
        month = '' + (d.getMonth() + 1),
        day = '' + d.getDate(),
        year = d.getFullYear();

    if (month.length < 2) month = '0' + month;
    if (day.length < 2) day = '0' + day;

    return [year, month, day].join('/');
}
