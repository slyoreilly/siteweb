			function construitEquipeDAlignement(tMavId) {
				//	return function(){
				var k = 0;
				boule = 0;
				//	alert("On construit!");
				while (k < window.vecMAV.length && boule == 0) {
					if (window.vecMAV[k].mavId == tMavId) {
						boule = 1;
					} else {
						k++;
					}
				}
				if (!boule && tMavId == -1) {
					jsonEqDom = JSON.parse(JSON.stringify(window.cJSON.equipe[0]));
					jsonEqVis = JSON.parse(JSON.stringify(window.cJSON.equipe[1]));
				}
				//					alert("Match non trouvé!");
				//	alert(JSON.stringify(window.cJSON));

				jsonEqDom = new Array();
				jsonEqVis = new Array();
				var iDom = 0;
				var iVis = 0;
				for ( i = 0; i < window.cJSON.equipe.length; i++) {
					if (window.vecMAV[k].eqDom == window.cJSON.equipe[i].equipeId) {
						jsonEqDom = JSON.parse(JSON.stringify(window.cJSON.equipe[i]));
						iDom = i;
					}
					if (window.vecMAV[k].eqVis == window.cJSON.equipe[i].equipeId) {
						jsonEqVis = JSON.parse(JSON.stringify(window.cJSON.equipe[i]));
						iVis = i;
					}
				}

				//		alert("Equipes assignées!");
				var presence;
				var vM = JSON.parse(JSON.stringify(window.vecMAV));

				jsonEqDom.joueur = new Array();
				var m = 0;
				var dansAlign = false;
				//				alert(iDom);
				//				alert(JSON.stringify(window.cJSON.equipe[iDom]));

				while (m < window.cJSON.equipe[iDom].joueur.length) {
					var n = 0;
					dansAlign = false;
					while (n < vM[k].alignementDom.length && dansAlign == false) {
						if (vM[k].alignementDom[n] == window.cJSON.equipe[iDom].joueur[m].joueurId) {
							dansAlign = true;
							jsonEqDom.joueur.push(window.cJSON.equipe[iDom].joueur[m]);
							jsonEqDom.joueur[jsonEqDom.joueur.length - 1].presence = "present";
						}
						n++;
					}
					if (dansAlign == false) {
						jsonEqDom.joueur.push(window.cJSON.equipe[iDom].joueur[m]);
						jsonEqDom.joueur[jsonEqDom.joueur.length - 1].presence = "absent";
					}
					m++;
				}

				var n = 0;
				dansAlign = false;
				while (n < vM[k].alignementDom.length) {
					m = 0
					dansAlign = false;
					while (m < jsonEqDom.joueur.length && dansAlign == false) {
						if (vM[k].alignementDom[n] == jsonEqDom.joueur[m].joueurId) {
							dansAlign = true;
						}
						m++;
					}
					if (!dansAlign) {

						for ( j = 0; j < window.cJSON.equipe.length; j++) {
							m = 0;
							while (m < window.cJSON.equipe[j].joueur.length) {
								if (window.cJSON.equipe[j].joueur[m].joueurId == vM[k].alignementDom[n]) {
									jsonEqDom.joueur.push(window.cJSON.equipe[j].joueur[m]);
									jsonEqDom.joueur[jsonEqDom.joueur.length - 1].presence = "remplace";
								}
								m++;
							}
						}

					}
					n++;
				}
				//	strJDom=window.vecMAV[k].alignementDom;
				//////////////////////////////////  Fin Domicile, début visiteur.

				jsonEqVis.joueur = new Array();
				var m = 0;
				var dansAlign = false;
				while (m < window.cJSON.equipe[iVis].joueur.length) {
					var n = 0;
					dansAlign = false;
					while (n < vM[k].alignementVis.length && dansAlign == false) {
						if (vM[k].alignementVis[n] == window.cJSON.equipe[iVis].joueur[m].joueurId) {
							dansAlign = true;
							jsonEqVis.joueur.push(window.cJSON.equipe[iVis].joueur[m]);
							jsonEqVis.joueur[jsonEqVis.joueur.length - 1].presence = "present";
						}
						n++;
					}
					if (dansAlign == false) {
						jsonEqVis.joueur.push(window.cJSON.equipe[iVis].joueur[m]);
						jsonEqVis.joueur[jsonEqVis.joueur.length - 1].presence = "absent";
					}
					m++;
				}

				var n = 0;
				dansAlign = false;
				while (n < vM[k].alignementVis.length) {
					m = 0
					dansAlign = false;
					while (m < jsonEqVis.joueur.length && dansAlign == false) {
						if (vM[k].alignementVis[n] == jsonEqVis.joueur[m].joueurId) {
							dansAlign = true;
						}
						m++;
					}
					if (!dansAlign) {

						for ( j = 0; j < window.cJSON.equipe.length; j++) {
							m = 0;
							while (m < window.cJSON.equipe[j].joueur.length) {
								if (window.cJSON.equipe[j].joueur[m].joueurId == vM[k].alignementVis[n]) {
									jsonEqVis.joueur.push(window.cJSON.equipe[j].joueur[m]);
									jsonEqVis.joueur[jsonEqVis.joueur.length - 1].presence = "remplace";
								}
								m++;
							}
						}

					}
					n++;
				}

				/**/
				//alert(JSON.stringify(jsonEqDom));
				//alert(JSON.stringify(jsonEqVis));

				//}
			}

			function JoueurAEquipe(joueurIn, equipeIn, boiteIn, boiteOut) {
				return function() {
					//	alert(joueurIn);
					equipeIn.joueur[equipeIn.joueur.length] = JSON.parse(joueurIn);
					equipeIn.joueur[equipeIn.joueur.length - 1].presence = 'remplace';
					// On vient de grandir le vecteur...
					boiteDomVis(boiteIn);
					boiteDomVis(boiteOut);
				}
			}

			function classeJoueursNom(vecJoueurs) {
				//				return function() {
				vecJoueurs.sort(function(a, b) {
					return ((a.nomJoueur == b.nomJoueur) ? 0 : ((a.nomJoueur.toLowerCase() > b.nomJoueur.toLowerCase()) ? 1 : -1 ));
				});
				//			}
			};

			function toggleJoueur(joueurOut, presence, boiteOut) {
				return function() {
					if (presence == 'remplace') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur.splice(joueurOut, 1)
								break;
							case 2:
								window.jsonEqVis.joueur.splice(joueurOut, 1)
								break;

						}
					} else if (presence == 'present') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur[joueurOut].presence = 'absent';
								break;
							case 2:
								window.jsonEqVis.joueur[joueurOut].presence = 'absent';
								break;

						}
					} else if (presence == 'absent') {
						switch(boiteOut) {
							case 1:
								window.jsonEqDom.joueur[joueurOut].presence = 'present';
								break;
							case 2:
								window.jsonEqVis.joueur[joueurOut].presence = 'present';
								break;

						}
					}
					boiteDomVis(boiteOut);

					//	alert(joueurIn);
				}
			}

			function RotateSpinner(spinnerId, up) {
				document.getElementById(spinnerId).value = up ? parseInt(document.getElementById(spinnerId).value) + 1 : parseInt(document.getElementById(spinnerId).value) - 1;
			}

			function boiteDomVis(boiteId) {
				switch(boiteId) {
					case 1:
						nomBoite = 'eqDom';
						nomEq = 'nom10';
						cellTab = document.getElementById('tableEqDom');
						if (cellTab.hasChildNodes()) {
							while (cellTab.childNodes.length >= 1) {
								cellTab.removeChild(cellTab.firstChild);
							}
						}

						window.jMAV[0] = new Array();
						window.eq[0] = window.jsonEqDom.equipeId;
						classeJoueursNom(window.jsonEqDom.joueur);
						for ( K = 0; K < window.jsonEqDom.joueur.length; K = K + 1) {
							//				window.jMAV[boiteId-1]=window.jMAV[boiteId-1]+window.cJSON.equipe[indiceEquipe].joueur[K].joueurId+',';

							//////////// section tableau.

							var strJ = JSON.stringify(window.jsonEqDom.joueur[K].joueurId);

							rangee = document.createElement('TR');

							cellRetire = document.createElement('TD');
							cellule = document.createElement('TD');

							if (window.jsonEqDom.joueur[K].presence == 'present') {
								window.jMAV[0].push(window.jsonEqDom.joueur[K].joueurId);
								cellule.style.color = "blue";
								strValBut = 'X';
							}
							if (window.jsonEqDom.joueur[K].presence == 'remplace') {
								cellule.style.color = "red";
								window.jMAV[0].push(window.jsonEqDom.joueur[K].joueurId);

							}
							if (window.jsonEqDom.joueur[K].position == 'G' || window.jsonEqDom.joueur[K].position == 'g') {
								window.gardien[0] = window.jsonEqDom.joueur[K].joueurId;
								cellule.style.color = "green";
							}
							if (window.jsonEqDom.joueur[K].presence == 'absent') {
								cellule.style.color = "grey";
								strValBut = '+';
							}
							if (window.jsonEqDom.joueur[K].presence == undefined) {

							}

							cellTab.appendChild(rangee);

						nomEq = 'nom20';

						if (cellTab.hasChildNodes()) {
							while (cellTab.childNodes.length >= 1) {
								cellTab.removeChild(cellTab.firstChild);
							}
						}

						window.jMAV[1] = new Array();
						window.eq[1] = window.jsonEqVis.equipeId;
						classeJoueursNom(window.jsonEqVis.joueur);

							//				window.jMAV[boiteId-1]=window.jMAV[boiteId-1]+window.cJSON.equipe[indiceEquipe].joueur[K].joueurId+',';

							var strJ = JSON.stringify(window.jsonEqVis.joueur[K].joueurId);
							var strValBut;
							rangee = document.createElement('TR');

							cellRetire = document.createElement('TD');
							cellule = document.createElement('TD');

							if (window.jsonEqVis.joueur[K].presence == 'present') {
								cellule.style.color = "blue";
								strValBut = 'X';
								window.jMAV[1].push(window.jsonEqVis.joueur[K].joueurId);
							}
							if (window.jsonEqVis.joueur[K].presence == 'remplace') {
								cellule.style.color = "red";
								window.jMAV[1].push(window.jsonEqVis.joueur[K].joueurId);
							}
							if (window.jsonEqVis.joueur[K].position == 'G' || window.jsonEqVis.joueur[K].position == 'g') {
								window.gardien[1] = window.jsonEqVis.joueur[K].joueurId;
								cellule.style.color = "green";
							}
							if (window.jsonEqVis.joueur[K].presence == 'absent') {
								cellule.style.color = "grey";
								strValBut = '+';

							}
							if (window.jsonEqVis.joueur[K].presence == undefined) {
								cellule.style.color = "black";
								strValBut = '';
							}

							if (strValBut != '') {
								bRet = document.createElement('INPUT')
								bRet.value = strValBut;
								bRet.type = "button";
								bRet.onclick = toggleJoueur(K, window.jsonEqVis.joueur[K].presence, 2);
								if (window.perm < 19)
									cellRetire.appendChild(bRet);
							}

							texteRang = document.createTextNode(window.jsonEqVis.joueur[K].nomJoueur);
							cellule.appendChild(texteRang);
							if (window.mavId != -1) {
								rangee.appendChild(cellRetire);
							}
							rangee.appendChild(cellule);
							cellTab.appendChild(rangee);

						}
						leNom = document.getElementById(nomEq);
						leNom.innerHTML = window.jsonEqVis.nomEquipe;

						break;

					case 3:
						nomEq = 'nom21';
						indiceEquipe = parseInt(document.getElementById('spinEq21').value) % denom;
						classeJoueursNom(window.cJSON.equipe[indiceEquipe].joueur);

						cellTab = document.getElementById('tableEqAlt');
						if (cellTab.hasChildNodes()) {
							while (cellTab.childNodes.length >= 1) {
								cellTab.removeChild(cellTab.firstChild);
							}
						}

						window.jMAV[boiteId - 1] = new Array();
						window.eq[boiteId - 1] = window.cJSON.equipe[indiceEquipe].equipeId;
						for ( K = 0; K < window.cJSON.equipe[indiceEquipe].joueur.length; K = K + 1) {
							//				window.jMAV[boiteId-1]=window.jMAV[boiteId-1]+window.cJSON.equipe[indiceEquipe].joueur[K].joueurId+',';
							window.jMAV[boiteId - 1].push(window.cJSON.equipe[indiceEquipe].joueur[K].joueurId);
							cellule = document.createElement('TD');
							if (window.cJSON.equipe[indiceEquipe].joueur[K].position == 'G' || window.cJSON.equipe[indiceEquipe].joueur[K].position == 'g') {
								window.gardien[boiteId - 1] = window.cJSON.equipe[indiceEquipe].joueur[K].joueurId;
								cellule.style.color = "green";
							}
							rangee = document.createElement('TR');
							cellFlecheGauche = document.createElement('TD');
							aFG = document.createElement('INPUT')
							aFG.value = '<<';
							aFG.type = "button";
							//			aFG.href='#';
							var strJ = JSON.stringify(window.cJSON.equipe[indiceEquipe].joueur[K]);
							//	alert(JSON.stringify(window.cJSON.equipe[indiceEquipe].joueur[K]));
							aFG.onclick = JoueurAEquipe(strJ, window.jsonEqDom, 1, 3);
							cellFlecheGauche.appendChild(aFG);
							if (window.mavId != -1 && window.perm < 19)
								rangee.appendChild(cellFlecheGauche);
							texteRang = document.createTextNode(window.cJSON.equipe[indiceEquipe].joueur[K].nomJoueur);
							cellule.appendChild(texteRang);
							rangee.appendChild(cellule);
							cellFlecheDroite = document.createElement('TD');
							flecheDroite = document.createTextNode('>>');
							aFD = document.createElement('INPUT')
							aFD.value = '>>';
							aFD.type = "button";
							var strJ = JSON.stringify(window.cJSON.equipe[indiceEquipe].joueur[K]);
							aFD.onclick = JoueurAEquipe(strJ, window.jsonEqVis, 2, 3);

							cellFlecheDroite.appendChild(aFD);
							if (window.mavId != -1 && window.perm < 19)
								rangee.appendChild(cellFlecheDroite);

							cellTab.appendChild(rangee);

						}
						leNom = document.getElementById(nomEq);
						leNom.innerHTML = window.cJSON.equipe[indiceEquipe].nomEquipe;
						break;

				}

			}
		</script>
