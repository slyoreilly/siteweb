			function demarreAffiche(noPage){

		}
	//alert(window.tmpPage);
		document.getElementById("iframe_"+window.tmpPage).className="apparait";			
		document.getElementById("h1_"+window.tmpPage).className="apparait";			
   	
 //      document.getElementById('IFA').contentWindow.location= window.listePage[window.tmpPage% window.listePage.length]; //will redirect to your blog page (an ex: blog.html)

    }, 8000);
