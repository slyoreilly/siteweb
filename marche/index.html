<html>
    <head>
        <script src="node_modules/angular/angular.min.js"></script>
        <script src="node_modules/@uirouter/angularjs/release/angular-ui-router.min.js"></script>
        <script src="node_modules/angular-resource/angular-resource.js"></script>
        <script src="appss.js"></script>
        <script src="/marche/src/directives/directives.js"></script>
        <script src="config/router.js"></script>
        <script src="/marche/src/controller/controleurArbitres.js"></script>
        <script src="/marche/src/controller/controleurJoueur.js"></script>
        <script src="/marche/src/controller/controleurPositions.js"></script>
        <script src="/marche/src/controller/controleurUser.js"></script>
        <script src="/marche/src/services/joueurProvider.js"></script>
        <script src="/marche/src/services/arbitreProvider.js"></script>
        <script src="/marche/src/services/positionProvider.js"></script>
        <script src="/marche/src/services/userProvider.js"></script>
        <script src="/marche/src/filters/filtres.js"></script>
        <link rel="stylesheet" href="/stylesheets/marche.css" type="text/css">
        <link rel="stylesheet" href="/style/font-awesome-4.7.0/css/font-awesome.min.css">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" http-equiv="X-UA-Compatible" />
        <style>
            .active {
                color: red;
                font-weight: bold;
            }
            .conteneur {
                display: flex;
                justify-content: space-around;
                flex-direction: row;
            }
            .conteneurexterne {
                display: block;
                width: 70%;
            }
            .conteneur > a {
                padding: 5px 10px 5px 10px;
                background-color: #0064B4;
                color: #eee;
            }
            .conteneur > a[ui-sref-active="active"] {
                background-color: #000099;
            }
            .conteneur > a:hover {
                background-color: #0084D0;
            }
        </style>
        <script type="text/javascript" charset="utf-8">
        function setCookie(c_name, value, exdays) {
                var exdate = new Date();
                exdate.setDate(exdate.getDate() + exdays);
                var c_value = escape(value) + ((exdays == null) ? "" : "; expires=" + exdate.toUTCString());
                document.cookie = c_name + "=" + c_value + '; path=/';
            }

            function getCookie(c_name) {
                var i, x, y, ARRcookies = document.cookie.split(";");
                for ( i = 0; i < ARRcookies.length; i++) {
                    x = ARRcookies[i].substr(0, ARRcookies[i].indexOf("="));
                    y = ARRcookies[i].substr(ARRcookies[i].indexOf("=") + 1);
                    x = x.replace(/^\s+|\s+$/g, "");
                    if (x == c_name) {
                        return unescape(y);
                    }
                }
                return null;
            }
</script>

    </head>
    <body ng-app="appSS">
        <h2>Bienvenue sur le Marché libre SyncStats!</h2>
        <div class="conteneurexterne">
            <div class="conteneur">
                <a ui-sref="joueurs" ui-sref-active="active">Joueurs</a>
                <a ui-sref="gardiens" ui-sref-active="active">Gardiens</a>
                <a ui-sref="arbitres" ui-sref-active="active">Arbitre</a>
                <a ui-sref="equipes" ui-sref-active="active">Équipes</a>
                <a ui-sref="ligues" ui-sref-active="active">Ligues</a>

                <!--button ng-click="sync()">Sync!</button-->

                <button ng-click="showLightBox = true" ng-hide="connecte">
                    Connexion
                </button>
                <button ng-click="connecte=false; user=null" ng-show="connecte">
                    Déconnexion
                </button>
                <p ng-show="connecte">
                    {{user.username}}
                </p>

                <lightbox-directive class="angular-lightbox" ng-class="{ hidden : !showLightBox }">
                    
                </lightbox-directive>

                <!--a ui-sref="joueursListe" ui-sref-active="active">Liste des joueurs</a>
                <a ui-sref="gardiensListe" ui-sref-active="active">Liste des gardiens</a>
                <a ui-sref="positions" ui-sref-active="active">Choisir selon les positions</a>
                <a ui-sref="positionsListe" ui-sref-active="active">Liste des positions</a-->

            </div>
            <ui-view></ui-view>
        </div>

    </body>

</html>
