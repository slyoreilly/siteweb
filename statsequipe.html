									ficheClassement();

		function ficheClassement(){
				window.cJSON.equipes.sort(function(a,b) { return (parseInt(2*b.vicDom)+2*parseInt(b.vicVis)+parseInt(b.nulDom)+parseInt(b.nulVis))-(parseInt(2*a.vicDom)+2*parseInt(a.vicVis)+parseInt(a.nulDom)+parseInt(a.nulVis));} );
				monEq = trouveIndiceJson(window.cJSON.equipes,'id',getValue('equipeId'));
				videNoeud('fiche');
				document.getElementById('fiche').innerHTML="Fiche (V-D-N): "+parseInt(window.cJSON.equipes[monEq].vicDom+window.cJSON.equipes[monEq].vicVis)+" - "+
												parseInt(window.cJSON.equipes[monEq].defDom+window.cJSON.equipes[monEq].defVis)+" - "+
												parseInt(window.cJSON.equipes[monEq].nulDom+window.cJSON.equipes[monEq].nulVis)+" <br /> "+
											"Rang: "+parseInt(monEq+1)+" sur "+parseInt(window.cJSON.equipes.length)+" equipes"+" <br /> "+" <br /> ";
				}
		
</script>
