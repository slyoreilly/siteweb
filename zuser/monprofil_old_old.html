		function getProfilMembre(id) {
			var requete_ajax = new XMLHttpRequest();

			var url = "/stats2/perso2JSON.php";
			//	alert(url);
			var strUser = "id=" + id;
			var params = strUser;
			//alert(params);
			requete_ajax.open('POST', url, true);

			//Send the proper header information along with the request
			requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
			requete_ajax.setRequestHeader("Content-length", params.length);
			requete_ajax.setRequestHeader("Connection", "close");

			requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
				if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
					//alert(requete_ajax.responseText);
					var profilMembre = eval('(' + requete_ajax.responseText + ')');
					joueurId=0;
					arbitreId=0;
					for ( M = 0; M < profilMembre.joueurs.length; M = M + 1) {
						joueurId = profilMembre.joueurs[M];
					}
					for (N = 0; N < profilMembre.arbitres.length; N = N + 1) {
						arbitreId = profilMembre.arbitres[N];
					}
					mUserId = profilMembre.id;
					mesStats(joueurId);
					monProfil(joueurId);

					amettre = document.getElementById('divProfilMembre');

					texteFiche = document.createTextNode(window.tl_profil_nom + ': ' + profilMembre.nom);

					amettre.appendChild(texteFiche);
					amettre.appendChild(document.createElement('BR'));
					texteFiche = document.createTextNode(window.tl_profil_prenom + ': ' + profilMembre.prenom);
					amettre.appendChild(texteFiche);
					amettre.appendChild(document.createElement('BR'));

				}
			}
			requete_ajax.send(params);

		}

		function getProfilArbitre(username) {
			var requete_ajax = new XMLHttpRequest();

				if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {
					//					alert(requete_ajax.responseText);

					try {
						profArb = eval('(' + requete_ajax.responseText + ')');

					}

					mParent = document.getElementById('divProfilArbitre')
					divArb = document.createElement('DIV');
					pArb = document.createElement('P');

					if (profArb.length> 0) {
						aArb = document.createElement('A');
						aArb.href = "/zarbitre/profilArbitre.html?arbitreId=" + profArb[0].arbitreId;
						aArb.appendChild(pArb);
						pArb.innerHTML = "Voir le profil";
						divArb.appendChild(aArb);
					} else {
						lien = document.createElement('A');
						lien.innerHTML = "Créer un profil arbitre ici";
						lien.style.textIndent = "15px";
						lien.className = "lien";
						//lien.href = menus[18].lien+"?userId="+window.usager.id+"&code=1";

						};

						divArb.appendChild(lien);
					}
					mParent.appendChild(divArb);
				}
			}
			requete_ajax.send(params);

		}

function selectOnglet(a){
	for(var b=0;b<window.vecTab.length;b++)
	{
	if(a==b)
		{
		document.getElementById(window.vecTab[a]).className='visible';
		document.getElementById('dTitre_'+a).className='titreOnglet actif';
	}
	else
	{
		document.getElementById(window.vecTab[b]).className='cache';
		document.getElementById('dTitre_'+b).className='titreOnglet passif';
	}
}
