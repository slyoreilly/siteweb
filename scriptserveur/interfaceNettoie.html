									$.ajax({

										},

 							               },

                               				 }

							function getReferencesVideosParLigue(){
									$.ajax({
										url : "https://syncstats.com/scriptserveur/getReferencesVideosParLigue.php",
										type : "POST",
										data : {
											premierVideo : $('#debut').val(),
											dernierVideo : $('#fin').val(),
											ligueId : $('#ligueId').val(),
											
										},
										dataType : "html",
              					         success: function (response) {
												faitTableau(eval("(" +response+ ")"));
											

 							               },

                               				 }

					function filtreServeur(serveur) {
//						console.log(serveur.emplacement+" "+$('#idSelSource option:selected').text());
						 return (strcmp(serveur.emplacement,$('#idSelSource option:selected').text())==0);
						}

					function getVideosOrphelins(fichiers){
									$.ajax({
										url : "getVideosOrphelins.php",
										type : "POST",
										data : {
											premierVideo : 1350000000000,
											dernierVideo : 1700000000000,
											fichiers: fichiers
										},
              					         success: function (response) {
											faitTableau(eval("(" +response+ ")"));
 							               },
                        				error:  function(xhr, status, error) {
                             				var err = eval("(" + xhr.responseText + ")");
                              					alert(err.Message+"  --  erreur getVideosOrphelins");
                               				 }
									});
								}
					function getListeVideosParReference(serveur, fichiers, from){
						var step = 100;
						console.log("On fait le "+(from/fichiers.length*100)+" %")
						if(from==0){
						window.newFichiers =[]}

						$.ajax({
										url : "https://"+serveur+"/scriptserveur/getListeVideosDeReferences.php",
										type : "POST",
										data : {
											fichiers: fichiers.slice(from, from+step)
										},
              					         success: function (response) {
											vecRet = eval("(" +response+ ")");
											for(var a=0;a<vecRet.length;a++){
													window.newFichiers.push(vecRet[a]);
												}
											if (from+step >=fichiers.length){ 
												faitTableau(window.newFichiers);
											}
											else{
												getListeVideosParReference(serveur, fichiers, from+step);
											}
 							               },
                        				error:  function(xhr, status, error) {
											console.log("Erreur, serveur!: "+serveur );
											console.log("Erreur, fichiers!: "+fichiers );
											console.log("Erreur!: "+xhr.responseText );
                               				 }
									});





					}

				$('#divCentrale').append($('<input></input>').attr("type","button").attr("data-toggle","modal").attr("data-target","#modalDeleteWarning").val("GO Efface les cochés").on("click",function(){

									type: "POST",
									 success: function(result){ }, error: function (jqXhr, textStatus, errorMessage) { // error callback 
        							$('p').append('Error: ' + errorMessage);

							}),
							$('<input></input>').attr("type","button").attr("data-toggle","pointers").attr("data-target","#modalSetPointersWarning").val("GO redéfini les pointeurs").on("click",function(){

									data: {fichiers: JSON.stringify(vecCoche),
									destination: $("#idSelAction option:selected").text()},
									type: "POST",
									 success: function(result){ }, error: function (jqXhr, textStatus, errorMessage) { // error callback 
        							$('p').append('Error: ' + errorMessage);
									    }
									  });

								});

							}),
							$('<input></input>').attr("type","checkbox").attr("id","checkAll"), $('<label></label>').attr("for","checkAll").text("Tout cocher")
				)

				$("#checkAll").click(function() {
  $("input[type=checkbox]").prop("checked", $(this).prop("checked"));
});

$("input[type=checkbox]").click(function() {
  if (!$(this).prop("checked")) {
    $("#checkAll").prop("checked", false);
  }
});
