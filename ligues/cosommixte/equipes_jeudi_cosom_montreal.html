                <script type="text/javascript">
					$.ajax({
						url : "http://syncstats.com/scriptsphp/listeEquipes.php",
						datatype : 'json',
						type : 'POST',
						data : jQuery.param({
							saisonId : 154,
							ligueId : 66
						}),
						contentType : 'application/x-www-form-urlencoded; charset=UTF-8',
						success : function(response) {
							getEquipes(response);

						},
						error : function(xhr, status, error) {
							var err = eval("(" + xhr.responseText + ")");
							alert(err.Message + "  --  ereur lc2Max");
						}
					});
					function getEquipes(response) {
					

					repClass = eval('(' + response + ')');
					for (var a = 0; a < repClass.saisons.length; a++) {
						if (repClass.saisons[a].saisonId == "154") {
							for (var b = 0; b < repClass.saisons[a].equipe.length; b++) {
							    saisonId=repClass.saisons[a].saisonId;
								$.ajax({
									url : "http://syncstats.com/stats2/equipe2JSON.php",
									datatype : 'json',
									type : 'GET',
									data : jQuery.param({
										equipeId : repClass.saisons[a].equipe[b].id,
									}),
									contentType : 'application/x-www-form-urlencoded; charset=UTF-8',
									success : function(response) {
                                        afficheEquipe(response,saisonId);
									},
									error : function(xhr, status, error) {
									    try{
										var err = eval("(" + xhr.responseText + ")");
										alert(err.Message + "  --  ereur lc2Max");}
										catch(err){
										  //  alert(xhr.responseText);
										}
									}
								});

							}
						}

					}
                    }
					function afficheEquipe(response,saisonId) {

						repJSON = eval('(' + response + ')');
                        statsJSON=null;  
                        for(var a=0;a<repJSON.Saisons.length;a++){
                            if(repJSON.Saisons[a].saisonId=saisonId){
                                statsJSON=repJSON.Saisons[a];        
                            }
                            
                            
                        }  

						statsJSON.joueurs.sort(function(a, b) {
							A = (parseInt(b.nbButs) + parseInt(b.nbPasses)) - (parseInt(a.nbButs) + parseInt(a.nbPasses));
							B = A ? A : (parseInt(b.nbButs) - parseInt(a.nbButs));
							return B;
						});
                        $('#cont_equipes').append($('<table></table>').css("border","1px solid white").css("min-width","400px").attr("id","equipe_"+statsJSON.equipeId).append($('<tr></tr>').append($('<td></td>').css("border-style","solid").css("border-color","#"+statsJSON.couleur1).css("border-width","1px").text(statsJSON.nom_equipe),$('<td></td>').css("background-color",'#'+statsJSON.couleur1).attr("colSpan","2").text("PJ") )));

						for (var a = 0; a < statsJSON.joueurs.length; a++) {
							$('#equipe_'+statsJSON.equipeId).append($('<tr></tr>').append($('<td></td>').text(statsJSON.joueurs[a].nom), $('<td></td>').text(statsJSON.joueurs[a].nomEquipe), $('<td></td>').attr("align", "center").text(statsJSON.joueurs[a].pj)));

						}

					}


                </script>
