<script type="text/javascript">

base="../../../";
for(var a=0;a<topLiensMardi.length;a++){
 $('#topLiens').append($('<li></li>').append($('<a></a>').attr('href',base+topLiensMardi[a].valeur).text(topLiensMardi[a].texte)));   
 if(topLiensMardi[a]=="Classements"){
     $('#topLiens li').last().addClass("current");
 }
}


 $.ajax({
                     url: "http://syncstats.com/stats2/classement2JSONPOST.php",
                     datatype:'json',
                        type: 'POST',
                      data: jQuery.param({ saisonId : saisonMardi, ligueId :66}) ,
                       contentType: 'application/x-www-form-urlencoded; charset=UTF-8',
                       success: function (response) {
                           afficheTableau(response);
                           
                                            },
                        error:  function(xhr, status, error) {
                             var err = eval("(" + xhr.responseText + ")");
                           alert(err.Message+"  --  ereur lc2Max");
                                }
                  }); 
                  
                  function afficheTableau(response){
                      
                      statsJSON = eval('(' +response + ')');

                      
                        for(var a=0;a<statsJSON.saisons.length;a++){
                            if(statsJSON.saisons[a].saisonId==saisonMardi){
                                statsJSON.saisons[a].equipe.sort(function(a, b) {
                                    B =  2*parseInt(b.vicDom)+2*parseInt(b.vicVis)+parseInt(b.nulDom)+parseInt(b.nulVis);
                                    A =  2*parseInt(a.vicDom)+2*parseInt(a.vicVis)+parseInt(a.nulDom)+parseInt(a.nulVis);
                            
                                    
                                        return B-A;
                                    });


                                if(statsJSON.saisons[a].structureDivision==null){
                                faitTableau('classement','CLASSEMENT - CALIBRE A',0);
      
                                for(var b=0;b<statsJSON.saisons[a].equipe.length;b++){
                                    
                                    pj = parseInt(statsJSON.saisons[a].equipe[b].vicDom)+parseInt(statsJSON.saisons[a].equipe[b].vicVis)+parseInt(statsJSON.saisons[a].equipe[b].defDom)+parseInt(statsJSON.saisons[a].equipe[b].defVis)+parseInt(statsJSON.saisons[a].equipe[b].nulDom)+parseInt(statsJSON.saisons[a].equipe[b].nulVis);
                                    points = 2*parseInt(statsJSON.saisons[a].equipe[b].vicDom)+2*parseInt(statsJSON.saisons[a].equipe[b].vicVis)+parseInt(statsJSON.saisons[a].equipe[b].nulDom)+parseInt(statsJSON.saisons[a].equipe[b].nulVis);
                                    $('#tbody_patineurs0').append($('<tr></tr>').append(
                            $('<td></td>').text(statsJSON.saisons[a].equipe[b].nom),
                            $('<td></td>').attr("align","center").text(pj),
                            $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[b].vicDom)+parseInt(statsJSON.saisons[a].equipe[b].vicVis)),
                            $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[b].nulDom)+parseInt(statsJSON.saisons[a].equipe[b].nulVis)),
                            $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[b].defDom)+parseInt(statsJSON.saisons[a].equipe[b].defVis)),
                            $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[b].bp)),
                            $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[b].bc)),
                            $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[b].bp)-parseInt(statsJSON.saisons[a].equipe[b].bc)),
                            $('<td></td>').attr("align","center").text(points)
                            ));
                                    
                                }
                                
                                }else{

                                    mesDiv =statsJSON.saisons[a].structureDivision;

                                    for(var d=0;d<mesDiv.length;d++){
                                        faitTableau('classement','CLASSEMENT - '+mesDiv[d].Nom,d);
                                        for(var e=0;e<statsJSON.saisons[a].equipe.length;e++){
                                            var arrIOf=  mesDiv[d].Equipes.indexOf(parseInt(statsJSON.saisons[a].equipe[e].id));
                                            console.log(arrIOf+' '+statsJSON.saisons[a].equipe[e].id +' '+mesDiv[d].Equipes);
                                            if(arrIOf>-1){
                                                            pj = parseInt(statsJSON.saisons[a].equipe[e].vicDom)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].vicVis)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].defDom)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].defVis)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].nulDom)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].nulVis);
                                                            points = 2*parseInt(statsJSON.saisons[a].equipe[e].vicDom)
                                                                +2*parseInt(statsJSON.saisons[a].equipe[e].vicVis)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].nulDom)
                                                                +parseInt(statsJSON.saisons[a].equipe[e].nulVis);
                                                            $('#tbody_patineurs'+d).append($('<tr></tr>').append(
                                                                $('<td></td>').text(statsJSON.saisons[a].equipe[e].nom),
                                                                $('<td></td>').attr("align","center").text(pj),
                                                                $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[e].vicDom)+parseInt(statsJSON.saisons[a].equipe[e].vicVis)),
                                                                $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[e].nulDom)+parseInt(statsJSON.saisons[a].equipe[e].nulVis)),
                                                                $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[e].defDom)+parseInt(statsJSON.saisons[a].equipe[e].defVis)),
                                                                $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[e].bp)),
                                                                $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[e].bc)),
                                                                $('<td></td>').attr("align","center").text(parseInt(statsJSON.saisons[a].equipe[e].bp)-parseInt(statsJSON.saisons[a].equipe[e].bc)),
                                                                $('<td></td>').attr("align","center").text(points)
                                                    ));
                                            }
                                        }
                                        

                                    }
                                }
                            }
                            
                            
                            
                        }

                  }
                  </script>
