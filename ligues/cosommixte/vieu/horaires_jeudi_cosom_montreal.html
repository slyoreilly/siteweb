            function getMatchsdeLigueID(saisonId) {
                var requete_ajax = new XMLHttpRequest();

                var url = "http://syncstats.com/scriptsphp/matchsDsSaison.php";

                var strLigueId = "ligueId=78";
                var strSaisonId = "saisonId="+saisonId;
                params = strLigueId + '&' + strSaisonId;
                url = url + "?" + params;

                //requete_ajax.send(null);
                //  return requete_ajax.responseText;

                requete_ajax.open('POST', url, true);
                //              requete_ajax.send(null);

                requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
                requete_ajax.setRequestHeader("Content-length", params.length);
                requete_ajax.setRequestHeader("Connection", "close");

                requete_ajax.send(params);

                requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
                    if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

                        rJSON = eval('(' + requete_ajax.responseText + ')');

                        loadConditions++;
                        //                      alert(loadConditions + " matrchsDsSaison");

                        if (loadConditions >= window.nbLoadTotal)
                            afficheTableau();

                    }
                };
            }

            function getInfoVid(vidIndex, mBut) {
                //alert("getInfoVid "+videofile);

                var place = mBut.video[vidIndex].emplacement;
                if (place == null || place=="") {
                    place = "syncstats.com";

                if ((navigator.userAgent.indexOf('iPhone') != -1) || (navigator.userAgent.indexOf('iPod') != -1) || (navigator.userAgent.indexOf('iPad') != -1)) {
                    //alert($('source').attr('src'));

                }
                $('#parent-erreur').remove();
                $('#contVids').show();
                $('#media-video').videoPlayer({
                    'playerWidth' : 1,
                    'videoClass' : 'video'
                });

                var requete_ajax = new XMLHttpRequest();
                var url = "http://syncstats.com/scriptsphp/getVideoUnique.php";
                var pVF = String(mBut.video[vidIndex].fic);

                var sVF = pVF.split(".");
                var strVid = "videofile=" + sVF[0];
                params = strVid;
                url = url + "?" + params;
                requete_ajax.open('POST', url, true);
                requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded;charset=utf-8");
                requete_ajax.send(params);
                if (mBut != undefined && mBut != "") {
                    chargeListeCote(vidIndex, mBut);
