      function setCookie(c_name,value,exdays)
{
var exdate=new Date();
exdate.setDate(exdate.getDate() + exdays);
var c_value=escape(value) + ((exdays==null) ? "" : "; expires="+exdate.toUTCString());
document.cookie=c_name + "=" + c_value+'; path=/';
}

function getCookie(c_name)
{
var i,x,y,ARRcookies=document.cookie.split(";");
for (i=0;i<ARRcookies.length;i++)
  {
  x=ARRcookies[i].substr(0,ARRcookies[i].indexOf("="));
  y=ARRcookies[i].substr(ARRcookies[i].indexOf("=")+1);
  x=x.replace(/^\s+|\s+$/g,"");
  if (x==c_name)
    {
    return unescape(y);
    }
  }
  return null;
}

            function getEquipe(id){
                for(var a=0;a<window.vecEquipes.length;a++){
                    console.log(JSON.stringify(window.vecEquipes[a]));
                    console.log(id);
                    if(parseInt(window.vecEquipes[a].id)==id){

            function compare(a,b) {
                var upA =a.nom; 
                var upB =b.nom; 
                try{
  if (upA.toUpperCase() < upB.toUpperCase())
    return -1;
  if (upA.toUpperCase() > upB.toUpperCase())
    return 1;
  return 0;}
  catch(err){return 0;}
}
    function compareDate(a,b) {
  if (a.date < b.date)
    return 1;
  if (a.date > b.date)
    return -1;
  return 0;
}

         function peupleEquipe(monVec,saisonId){
             for(var a=0;a<monVec.saisons.length;a++){
                 if(monVec.saisons[a].saisonId==saisonId){
                     indSaison=a;
                     monVec.saisons[a].equipe.sort(compare);
                     
                     $('#selEq').append($('<option></option>').text("Choisir votre équipe").val(0));
                     for(var b=0;b<monVec.saisons[a].equipe.length;b++){
                         if(monVec.saisons[a].equipe[b].cleValeur!=null){
                             monVec.saisons[a].equipe[b].cleValeur =  eval("(" + monVec.saisons[a].equipe[b].cleValeur  + ")");
                         }
                         indEquipe = b;
                          $('#selEq').append($('<option></option>').text(monVec.saisons[indSaison].equipe[b].nom).val(monVec.saisons[indSaison].equipe[b].id));
                     }
                     window.vecEquipes = monVec.saisons[a].equipe;
                 }
                 
             }
             
             $('#selEq').on("change",appliqueFiltres);
         }
             function peupleSurfaces(monVec){
                  monVec.sort(compare);
                     $('#selSurf').append($('<option></option>').text("Choisir votre surface").val(0));
             for(var a=0;a<monVec.length;a++){
                          $('#selSurf').append($('<option></option>').text(monVec[a].nomGlace).val(monVec[a].arenaId));
                     
                 
                 
             }
             
             $('#selSurf').on("change",appliqueFiltres);
         }
        
        function appliqueFiltres(){
              maSurf = $('#selSurf').find(":selected").val();
               monEq = $('#selEq').find(":selected").val();
               if($('#debPlage').val()==""){
                   setDeb=false;
               }else{
                   setDeb=true;
               }
               if($('#finPlage').val()==""){
                   setFin=false;
               }else{
                   setFin=true;
               }
               
             var deb = new Date($('#debPlage').val());
             var fin = new Date($('#finPlage').val());
                            //  $('#divSelEq').hide();
                            //  $('#divLesMatchs').show();
                              
                              
                            // $('#divLesMatchs input.inputHiddenSurfaceId').parent().hide();
                             //$('#divLesMatchs input.inputHiddenSurfaceId[value='+maSurf+']').parent().show();
                              var cptCharge = 0;
                              var maxCharge = 10;

                            okSurf =  false;
                            okDate = false;

                             for(var c=0;c<window.matchsDsSaison.matchs.length&&cptCharge<maxCharge;c++){
                                        okDate = false;
                                 dateAchecker = new Date(window.matchsDsSaison.matchs[c].date);
                                // alert(dateAchecker+" -- "+deb+" -- "+fin);
                                 if(!setDeb&&!setFin){
                                      okDate = true;
                                 }
                                 if(setDeb&&!setFin){
                                      if(deb.getTime()<dateAchecker.getTime()){
                                      okDate = true;
                                 }
                                 }
                                 if(!setDeb&&setFin){
                                      if(fin.getTime()>dateAchecker.getTime()){
                                      okDate = true;
                                 }
                                 }
                                 if(setDeb&&setFin){
                                 if(deb.getTime()<dateAchecker.getTime()&&fin.getTime()>dateAchecker.getTime()){
                                      okDate = true;
                                 }
                                 }
                                 
                               // alert(okDate+"");
                                 okSurf =window.matchsDsSaison.matchs[c].arenaId==maSurf
                                        ||maSurf==0;
                                 if((window.matchsDsSaison.matchs[c].eqDomId==monEq
                                        ||monEq==0)
                                     && okSurf&& okDate
                                     ){
                                     if( $('#divLesMatchs input.inputHiddenMatchId[value="'+window.matchsDsSaison.matchs[c].matchID+'"]').length==0){
                                        appendMatch(c, 2);
                                        cptCharge++;  
                                     }
                                     
                                      $('#divLesMatchs input.inputHiddenMatchId[value="'+window.matchsDsSaison.matchs[c].matchID+'"]').parent().show();
                                  }  
                                  else{
                                            if((window.matchsDsSaison.matchs[c].eqVisId==monEq||monEq==0)
                                              && okSurf&& okDate
                                               ){
                                                 if( $('#divLesMatchs input.inputHiddenMatchId[value="'+window.matchsDsSaison.matchs[c].matchID+'"]').length==0){
                                                    appendMatch(c, 1);
                                                        cptCharge++;  
                                                 }
                                                 $('#divLesMatchs input.inputHiddenMatchId[value="'+window.matchsDsSaison.matchs[c].matchID+'"]').parent().show();
                         
                                            }
                                            else{
                                                
                                                 $('#divLesMatchs input.inputHiddenMatchId[value="'+window.matchsDsSaison.matchs[c].matchID+'"]').parent().hide();
                                            }
                                  }
                                 
                               
                             }
            
        }
