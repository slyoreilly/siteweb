 	<script type="text/javascript">

try{



//statsJSONHome.joueurs.triPar("nbButs",1,1);
statsJSONHome.joueurs.sort(function(a,b) { return (parseInt(b.nbButs)+parseInt(b.nbPasses)) - (parseInt(a.nbButs)+parseInt(a.nbPasses)) } );


for (J=0;J<=statsJSONHome.joueurs.length;J=J+1)
{
//	if(!statsJSONHome.joueurs[J].nom.isNull&&statsJSONHome.joueurs[J].nom!='Anonyme')
	if(!statsJSONHome.joueurs[J].nom.isNull)
	{
	rangee = document.createElement('TR');
	amettre = document.getElementById('rangeeTitreEquipe');
	amettre.parentNode.appendChild(rangee);

	celluleNo = document.createElement('TD');
	texteNo = document.createTextNode(statsJSONHome.joueurs[J].no);
	celluleNo.appendChild(texteNo);
		if(J%2==0)
		celluleNo.setAttribute('class','lignePaire');
	else
		celluleNo.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleNo);


	
	celluleEq = document.createElement('TD');
	texteEq = document.createTextNode(statsJSONHome.joueurs[J].nom);
	celluleEq.appendChild(texteEq);
		if(J%2==0)
		celluleEq.setAttribute('class','lignePaire');
	else
		celluleEq.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleEq);

	cellulePj = document.createElement('TD');
	textePj = document.createTextNode(statsJSONHome.joueurs[J].pj);
	cellulePj.appendChild(textePj);
		if(J%2==0)
		cellulePj.setAttribute('class','lignePaire');
	else
		cellulePj.setAttribute('class','ligneImpaire');
rangee.appendChild(cellulePj);

	celluleNom = document.createElement('TD');
	texteNom = document.createTextNode(statsJSONHome.joueurs[J].nbButs);
	celluleNom.appendChild(texteNom);
		if(J%2==0)
		celluleNom.setAttribute('class','lignePaire');
	else
		celluleNom.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleNom);



	cellulePas1 = document.createElement('TD');
	textePas1 = document.createTextNode(statsJSONHome.joueurs[J].nbPasses);
	cellulePas1.appendChild(textePas1);
		if(J%2==0)
		cellulePas1.setAttribute('class','lignePaire');
	else
		cellulePas1.setAttribute('class','ligneImpaire');
rangee.appendChild(cellulePas1);



	celluleChrono = document.createElement('TD');
	texteChrono = document.createTextNode(parseInt(statsJSONHome.joueurs[J].nbButs)+parseInt(statsJSONHome.joueurs[J].nbPasses));
	celluleChrono.appendChild(texteChrono);
		if(J%2==0)
		celluleChrono.setAttribute('class','lignePaire');
	else
		celluleChrono.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleChrono);
	}

}
	
	
	
//	document.body.rangee.cellule.innerHTML ='yo';	
	}
	catch(err){}


//////////////////////////////////////////////////////
//	Tableau gardien
//////////////////////////////////////////////////////

try{

for (J=0;J<gJSON.gardiens.length;J=J+1)
{
//	if(!statsJSONHome.joueurs[J].nom.isNull&&statsJSONHome.joueurs[J].nom!='Anonyme')
	if(gJSON.gardiens[J].nom!=null)
	{
//		alert("dans le if:" + gJSON.gardiens[J].nom);
	rangee = document.createElement('TR');
	amettre = document.getElementById('rangeeTitreGardiens');
	amettre.parentNode.appendChild(rangee);
	
	celluleEq = document.createElement('TD');
	texteEq = document.createTextNode(gJSON.gardiens[J].nom);
	celluleEq.appendChild(texteEq);
	if(J%2==0)
		celluleEq.setAttribute('class','lignePaire');
	else
		celluleEq.setAttribute('class','ligneImpaire');
	rangee.appendChild(celluleEq);

	var matchs = parseInt(gJSON.gardiens[J].victoires)+parseInt(gJSON.gardiens[J].defaites)+parseInt(gJSON.gardiens[J].nulles);

	cellulePj = document.createElement('TD');
	textePj = document.createTextNode(matchs);
	cellulePj.appendChild(textePj);
		if(J%2==0)
		cellulePj.setAttribute('class','lignePaire');
	else
		cellulePj.setAttribute('class','ligneImpaire');
rangee.appendChild(cellulePj);

	celluleNom = document.createElement('TD');
	texteNom = document.createTextNode(gJSON.gardiens[J].victoires);
	celluleNom.appendChild(texteNom);
		if(J%2==0)
		celluleNom.setAttribute('class','lignePaire');
	else
		celluleNom.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleNom);



	cellulePas1 = document.createElement('TD');
	textePas1 = document.createTextNode(gJSON.gardiens[J].defaites);
	cellulePas1.appendChild(textePas1);
		if(J%2==0)
		cellulePas1.setAttribute('class','lignePaire');
	else
		cellulePas1.setAttribute('class','ligneImpaire');
rangee.appendChild(cellulePas1);



	celluleChrono = document.createElement('TD');
	texteChrono = document.createTextNode(gJSON.gardiens[J].nulles);
	celluleChrono.appendChild(texteChrono);
		if(J%2==0)
		celluleChrono.setAttribute('class','lignePaire');
	else
		celluleChrono.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleChrono);

	celluleButs = document.createElement('TD');
	texteButs = document.createTextNode(gJSON.gardiens[J].nbButs);
	celluleButs.appendChild(texteButs);
		if(J%2==0)
		celluleButs.setAttribute('class','lignePaire');
	else
		celluleButs.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleButs);

	var buts = parseInt(gJSON.gardiens[J].nbButs);
	var moy = buts/matchs;
	celluleMoy = document.createElement('TD');
	texteMoy = document.createTextNode(Math.round(moy*1000)/1000);
	celluleMoy.appendChild(texteMoy);
		if(J%2==0)
		celluleMoy.setAttribute('class','lignePaire');
	else
		celluleMoy.setAttribute('class','ligneImpaire');
rangee.appendChild(celluleMoy);

	}

}
	
	
	
//	document.body.rangee.cellule.innerHTML ='yo';
