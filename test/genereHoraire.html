			$.makeTable = function(mydata) {
				var table = $('<table border=1>');
				var tblHeader = "<tr>";
				for (var k in mydata[0])
				tblHeader += "<th>" + k + "</th>";
				tblHeader += "</tr>";
				$(tblHeader).appendTo(table);
				$.each(mydata, function(index, value) {
					var TableRow = $("<tr></tr>");
					$.each(value, function(key, val) {

						$(TableRow).append($("<td></td>").text(val));
						if (key == "telId") {

							if (index % 2 == 0) {
								$(TableRow).addClass("lignePaire");
							} else {
								$(TableRow).addClass("ligneImpaire");
							}

						}
					});
					$(table).append(TableRow);

				});
				return ($(table));
			};

			function genereHoraire() {

				equipes = Array();
				equipeProtege = Array();
				expEquipes = Array();
				equipesMatchParSemaine = Array();

				for (var a = 0; a < vecEquipes.length; a++) {
					equipes[a] = Array();
					equipeProtege[a] = Array();
					expEquipes[a] = Array();
					equipesMatchParSemaine[a] = Array();

					for (var b = 0; b < semaines.length; b++) {
						equipes[a][b] = Array();
						equipeProtege[a][b] = Array();
						expEquipes[a][b] = Array();
						for (var c = 0; c < vecPlages.length; c++) {
							equipes[a][b][c] = 0;
							equipeProtege[a][b][c] = 0;
							expEquipes[a][b][c] = 0;
						}
					}
					for (var b = 0; b < semaines.length; b++) {
						equipesMatchParSemaine[a][b] = 0;
					}
				}

				essais = 0;

				vielEssai = 1000000;
				//			equipes = Array();
				macroTentative = 1000;
				/// Le tableau 3D equipes va contenir [les nom des équipes] x [Les semaines] x [Les plages]. Dans le tableau, c'est booléan. Match ou non.
				equipesMatchParSemaine = Array();
				/// Le tableau 2D equipesMatchParSemaine va contenir [les nom des équipes] x [Les semaines] = nombre de match joué dans une semaine.
				//
				vecCpt = Array()
					for(var f=0; f< semaines.length;f++){
						vecCpt[f]=0;
					}
					strVec=""
					for(var g=0;g< semaines.length;g++){
						strVec = strVec +" "+vecCpt[g];
					}
					console.log("vec Dist succc"+strVec);

				while (essais < macroTentative) {//  On fera ce nombre d'essai pour obetnir la solution optimale.
					console.log(essais/macroTentative*100);
					$('#progression').html(essais/macroTentative*100);
					// Initialisation pour un nouvel essai

					for (var a = 0; a < vecEquipes.length; a++) {
						equipes[a] = Array();
						equipesMatchParSemaine[a] = Array();
						for (var b = 0; b < semaines.length; b++) {
							equipesMatchParSemaine[a][b] = 0;
						}
						for (var b = 0; b < semaines.length; b++) {
							equipes[a][b] = Array();
							for (var c = 0; c < vecPlages.length; c++) {
								equipes[a][b][c] = 0;
								if (equipeProtege[a][b][c] == 1) {
									equipes[a][b][c] = 1;
									equipesMatchParSemaine[a][b]++;
								}
							}
						}

					}

					////
					//  Cette section serait à enlever et à remplacer au profit d'un shuffle.
					//

					lesMatch = Array();
					indMatchPris = Array();

					chargeMatchsFixes();
					nbMatchFixe = lesMatch.length;
					nConf = vecEquipes.length*(vecEquipes.length-1)/2;
					nbConfEq = Math.ceil((vecPlages.length*semaines.length)/nConf);
					

					//  On construit un vecteur 2D contenant toutes les confrontations possibles.
					//        for(var a=0; a<(nbMatchEq*nomEquipes.length);a++){
					for (var i = 0; i < vecEquipes.length; i++) {
						for (var j = 0; j < vecEquipes.length; j++) {
                        confBooke = 0;
                        //trouve = 0;
                        if (i != j) {
                            while(confBooke<nbConfEq){
                                trouve = 0;
                                var b = 0;
                                //confBooke = 0;
                            
                                while (b < lesMatch.length) {
                                    if (lesMatch[b].dom == i && lesMatch[b].vis == j || lesMatch[b].vis == i && lesMatch[b].dom == j) {
                                       trouve++;
                                       confBooke = trouve;
                                    }
                                    b++;
                                 }
                                 if (confBooke<nbConfEq&& trouve<nbConfEq) {
                                    lesMatch[b] = {};
                                    lesMatch[b].dom = i;
                                    lesMatch[b].vis = j;
                                    confBooke++;
									//           alert(JSON.stringify(confrontations[b])+" et b:"+b );
                                 }
                            }
                        }
						}
					}
					shuffleArray(lesMatch, nbMatchFixe);
					//alert(JSON.stringify(lesMatch));
					semaineMatchs = Array();

					cptTentative = 0;
					MaxTentative = 50 + semaines.length;
					Tentative2 = 100;
					reculeTentative=10;
					cptRecule=0;

					a = 0;
					echec=false;
					//  Ici, on va itérer sur toutes les semaines. On va voir si on peut placer tous les matchs en suivant certaines règles.

					while (a < semaines.length && cptTentative < MaxTentative) {
						initIndMatchPris = indMatchPris.length;
						semaineMatchs[a] = Array();
						cpt = 0;
						recom = true;
						/*shuffleArray(lesMatch,nbMatchFixe);
						 indMatchPris = Array();
						 for(var b=0;b<nbMatchFixe;b++){
						 indMatchPris.push(b);
						 }*/
						while (recom && (cpt < Tentative2)) {

							retourPlace = placeMatchSemaine(a, indMatchPris);
							///  placeMatchSemaine va nous dire si l'algorythme est parvenu à inscrire correctement le match.
							if (retourPlace == 1) {
								 //       console.log("Reste de la place dans la semaine ... "+a);
								recom = true;
							} else {
								vecCpt[a]++;
								  //        console.log("Semaine ... "+a+" complète!");
								recom = false;
							}

							cpt++;
						}
						toutLeMondeJoueUnMatch = true;
						//alert(JSON.stringify(equipesMatchParSemaine));
						for (var b = 0; b < vecEquipes.length; b++) {
							// Si une équipe ne joue pas, on réinitialise.

							if (window.equipesMatchParSemaine[b][a] == 0) {
								//   $('#divTest').append(
								//   $('<div></div>').text("Equipe "+vecEquipes[b].nom+" n'a pas joué."),$('<br/>'));

								toutLeMondeJoueUnMatch = false;
								for (var c = 0; c < vecEquipes.length; c++) {
									for (var d = 0; d < vecPlages.length; d++) {
										equipes[c][a][d] = 0;
										equipesMatchParSemaine[c][a] = 0;
										if (equipeProtege[c][a][d] == 1) {
											equipes[c][a][d] = 1;
											equipesMatchParSemaine[c][a]++;
										}
									}
								}

							}

						}

			function analyse() {
				semaine = 0;
				superSommeVar2 = 0;
				eqParPlages = Array();
				doubleMatchJoue = 0;
				for (var a = 0; a < equipes.length; a++) {// Calcul de la variance
					eqParPlages[a] = Array();
					//      equipeCour = $('<div></div>');
					//           $('#divTest').append(equipeCour);
					somme = 0;
					sommeVar2 = 0;
					for (var c = 0; c < vecPlages.length; c++) {
						eqParPlages[a][c] = 0;
						for (var b = 0; b < semaines.length; b++) {
							eqParPlages[a][c] = eqParPlages[a][c] + equipes[a][b][c];
							somme = somme + equipes[a][b][c];
						}
					}
					moy = somme / vecPlages.length;

					for (var b = 0; b < vecPlages.length; b++) {
						//                  $(equipeCour).append($('<div></div>').text(eqParPlages[a][b]));
						sommeVar2 = sommeVar2 + (eqParPlages[a][b] - moy) * (eqParPlages[a][b] - moy);
					}
					//                   $(equipeCour).append($('<div></div>').text("-----"+sommeVar2));
					superSommeVar2 = superSommeVar2 + sommeVar2;
					doubleMatchJoue += somme;
				}
				//alert(JSON.stringify(lesMatch));
				if ((superSommeVar2 < vielEssai) && (vecPlages.length * semaines.length == doubleMatchJoue / 2)) {
					$('#divTest').append($('<div></div>').text("Viel essais " + vielEssai + ", nouveau: " + superSommeVar2 + ", nbMatch: " + window.indMatchPris.length + ", double matchs jouée: " + doubleMatchJoue), $('<br/>'));
					alert("Réussi!");
					vielEssai = superSommeVar2;
					somme = 0;

					horaireGenere = true;
					expEquipes = Array();
					for (var p = 0; p < vecEquipes.length; p++) {
						expEquipes[p] = Array();
						for (var q = 0; q < semaines.length; q++) {
							expEquipes[p][q] = Array();

							for (var r = 0; r < vecPlages.length; r++) {

								if (equipes[p][q][r] == 1) {
									expEquipes[p][q][r] = 1;
									somme++;

								} else {
									expEquipes[p][q][r] = 0;
								}
							}
						}

					}

					//alert(somme);
					return true;
				} else {
					//   alert("nbMatch placé: "+window.indMatchPris.length+" Viel essai: "+vielEssai+" , nouvel essai: "+superSommeVar2);
					return false;
				}

			}

			function shuffleArray(array, de) {
				for (var i = array.length - 1; i > parseInt(de); i--) {
					var j = Math.floor(Math.random() * (i - parseInt(de) + 1)) + parseInt(de);
					var temp = array[i];
					array[i] = array[j];
					array[j] = temp;

				}
				return array;
			}

			function getNextId(objet) {
				try {
					tmpId = -1;
					for (var a = 0; a < objet.length; a++) {
						//alert(tmpId+" , "+JSON.stringify(objet));
						if (tmpId < parseInt(objet[a].id)) {
							tmpId = parseInt(objet[a].id);
						}
					}
					return tmpId + 1;

				} catch(err) {
					return -1;
				}

			}

			function getIndice(objet, id) {
				try {

					for (var a = 0; a < objet.length; a++) {
						if (parseInt(objet[a].id) == parseInt(id)) {
							return a;
						}
					}
					return -1;

				} catch(err) {
					return -1;
				}

			}

						}
					}

					return -1;
				}
