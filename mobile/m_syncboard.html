			function getInfoMatch(matchId) {
				//			return function(){

				var requete_ajax = new XMLHttpRequest();

				var url = "/syncboard/scriptsSB/infoMatch2SB.php";

				var strMatchId = "matchId=" + matchId;

				params = strMatchId;

				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.

							window.dureePeriode = infoMatch.cvLigue.reglements.dureePeriode;
						} catch(err) {
						}
						webMatchId = infoMatch.matchId;
						window.matchId = infoMatch.matchId;
						var d = new Date();
						offset = d.getTime() - infoMatch.heure * 1000;
						/*alert(d.getTime());
						 alert(infoMatch.heure*1000);
						 alert(offset);
						 */
						getJSONdeMatchID(webMatchId);

						//alert(getCookie('ligueId')==null||getCookie('ligueId')=="");
						if (getCookie('ligueId') == null || getCookie('ligueId') == "") {
							setCookie('ligueId', ligueId, 120);
							//alert(getCookie('ligueId'));
						}
						//				alert(document.getElementById("tabResume").href);
						window.conditions++;
						if (window.conditions >= 2) {
							afficheMatch();
						}

					}
				};
				//alert(requete_ajax.responseText);
				//				alert(JSON.stringify(listeMatch));
				//	return vecMAV;
				//}
			}

			function getPunitions(matchId) {
				//			return function(){

				var requete_ajax = new XMLHttpRequest();

				var url = "/syncboard/scriptsSB/punitions2SB.php";

				var strMatchId = "match=" + matchId;

				params = strMatchId;
				url = url + "?" + params;

				//		alert(url+'?'+param);
				//requete_ajax.send(null);
				//	return requete_ajax.responseText;

				requete_ajax.open('POST', url, true);
				//				requete_ajax.send(null);

				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

						mesPuns = eval('(' + requete_ajax.responseText + ')');
						punDom = new Array();
						punVis = new Array();
						var d = new Date();

						for (var a = 0; a < mesPuns.length; a++) {
							//							alert(mesPuns[a].equipeId+" "+window.eqIdDom+" "+window.eqIdVis)
							var laDate = mesPuns[a].chrono.split(' ')[0];
							var lHeure = mesPuns[a].chrono.split(' ')[1];

							var d2 = new Date(laDate.split("-")[0], laDate.split("-")[1] - 1, laDate.split("-")[2], lHeure.split(':')[0], lHeure.split(':')[1], lHeure.split(':')[2]);
							if (mesPuns[a].equipeId == window.eqIdDom) {
								var discr = (parseInt(mesPuns[a].duree) * 60000 + d2.getTime()) - d.getTime() - window.offset * 1000;
								if (discr > 0) {
									punDom.push(discr);
								}
								/*alert(discr);
								 alert(parseInt(mesPuns[a].duree)*60);
								 alert(d2.getTime());
								 alert(d.getTime());*/
							} else if (mesPuns[a].equipeId == window.eqIdVis) {
								var discr = (parseInt(mesPuns[a].duree) * 60000 + d2.getTime()) - d.getTime() - window.offset * 1000;
								if (discr > 0) {
									punVis.push(discr);
								}
								/*alert(discr);
								 alert(parseInt(mesPuns[a].duree)*60);
								 alert(d2.getTime());
								 alert(d.getTime());
								 alert(window.offset);*/

							}
						}
						videNoeud('divPunDom');
						videNoeud('divPunVis');
						for (var b = 0; b < punDom.length; b++) {
							var min = Math.floor(punDom[b] / 60000);
							var sec = (punDom[b] / 1000) % 60;
							document.getElementById('divPunDom').innerHTML = min + ":" + sec;
						}
						for (var c = 0; c < punVis.length; c++) {
							var min = Math.floor(punVis[c] / 60000);
							var sec = (punVis[c] / 1000) % 60;
							document.getElementById('divPunVis').innerHTML = min + ":" + sec;
						}

					}
				};
				//alert(requete_ajax.responseText);
				//				alert(JSON.stringify(listeMatch));
				//	return vecMAV;
				//}
			}
