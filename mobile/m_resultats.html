			function getMatchsdeLigueID(saisonId) {
				var requete_ajax = new XMLHttpRequest();

				var url = "/scriptsphp/matchsDsSaison.php";

				var strLigueId = "ligueId=" + window.ligueId;
				var strSaisonId = "saisonId=" + saisonId;

				requete_ajax.open('POST', url, true);
				//				requete_ajax.send(null);

				requete_ajax.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
				requete_ajax.setRequestHeader("Content-length", params.length);
				requete_ajax.setRequestHeader("Connection", "close");

				requete_ajax.send(params);

				requete_ajax.onreadystatechange = function() {//Call a function when the state changes.
					if (requete_ajax.readyState == 4 && requete_ajax.status == 200) {

						rJSON = eval('(' + requete_ajax.responseText + ')');

						loadConditions++;
						if (loadConditions >= window.nbloadTotal)
							remplirTableau();

					}
				}
			}

			

			function remplirTableau() {

				detruitNoeud("tableResultats");
				//genTableau(window.mJS);
	
				matchsDsSaison = new Array();

				try {
					maSaison = vecEquipe.Ligue.saisons[vecEquipe.Ligue.saisons.length - 1 ];
					var dPMHor = maSaison.pm.split(" ")[1];
					var dPMCal = maSaison.pm.split(" ")[0];
					var dDMHor = maSaison.dm.split(" ")[1];
					var dDMCal = maSaison.dm.split(" ")[0];
					//					alert(dPMCal);
					//					alert(dPMHor);
					//					alert(dDMCal);
					//					alert(dDMHor);
					var dPM = new Date(dPMCal.split("-")[0], dPMCal.split("-")[1], dPMCal.split("-")[2], dPMHor.split(":")[0], dPMHor.split(":")[1], dPMHor.split(":")[2]);
					var dDM = new Date(dDMCal.split("-")[0], dDMCal.split("-")[1], dDMCal.split("-")[2], dDMHor.split(":")[0], dDMHor.split(":")[1], dDMHor.split(":")[2]);
					var cpt = 0;
					for (var J = 0; J < window.rJSON.matchs.length; J++) {
						d1Cal = window.rJSON.matchs[J].date.split(" ")[0];
						d1Hor = window.rJSON.matchs[J].date.split(" ")[1];

						var d1 = new Date(d1Cal.split("-")[0], d1Cal.split("-")[1], d1Cal.split("-")[2], d1Hor.split(":")[0], d1Hor.split(":")[1], d1Hor.split(":")[2]);
						//alert(d1+" / "+dPM+" / "+dDM );
						if (dPM < d1 && dDM > d1) {
							matchsDsSaison[cpt] = window.rJSON.matchs[J];
							matchsDsSaison[cpt].etat = "termine";
							cpt++;
						}

					}
					
					//	alert(cpt);
					for (var a = 0; a < window.vecMAV.length; a++) {
						d1Cal = window.vecMAV[a].date.split(" ")[0];
						d1Hor = window.vecMAV[a].date.split(" ")[1];

						

							var d1 = new Date(d1Cal.split("-")[0], d1Cal.split("-")[1], d1Cal.split("-")[2], d1Hor.split(":")[0], d1Hor.split(":")[1], d1Hor.split(":")[2]);
							//alert(dPM+' '+d1+' '+dDM);
							if (dPM < d1 && dDM > d1) {
								var trouve = 0;
								for (var b = 0; b < matchsDsSaison.length; b++)//  Vérifier si un match planifié a déjà été joué.
								{
									if (trouve == 0 && matchsDsSaison[b].etat == "termine" && matchsDsSaison[b].date.split(" ")[0] == d1Cal && matchsDsSaison[b].eqDomId == window.vecMAV[a].eqDom && matchsDsSaison[b].eqVisId == window.vecMAV[a].eqVis) {
										trouve = 1;
									}
								}
								if (trouve == 0) {
									matchsDsSaison[cpt] = window.vecMAV[a];
									matchsDsSaison[cpt].etat = "avenir";
									cpt++;
								}
							}
						

					}
					//										alert(cpt);

					//					alert(JSON.stringify(matchsDsSaison));

					matchsDsSaison.sort(function(a, b) {

						d1Cal = a.date.split(" ")[0];
						d1Hor = a.date.split(" ")[1];

						var d1 = new Date(d1Cal.split("-")[0], d1Cal.split("-")[1], d1Cal.split("-")[2], d1Hor.split(":")[0], d1Hor.split(":")[1], d1Hor.split(":")[2]);
						d2Cal = b.date.split(" ")[0];
						d2Hor = b.date.split(" ")[1];

						var d2 = new Date(d2Cal.split("-")[0], d2Cal.split("-")[1], d2Cal.split("-")[2], d2Hor.split(":")[0], d2Hor.split(":")[1], d2Hor.split(":")[2]);

						//							var d1 = new Date(a.date);
						//							var d2 = new Date(b.date);
						return (d2 - d1)
					});
				} catch(err) {
					alert('err...');
				}

				afficheResultats(matchsDsSaison);
				//defileFiches();

			}
