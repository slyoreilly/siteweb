			function getInfoMatch(matchId) {

				var strUrl = "/scriptsphp/infoMatch2JSON.php?matchId="+matchId;

				$.post(strUrl, function(result) {
						ligueId = result.ligueId;
						//					alert(getCookie('ligueId')==null||getCookie('ligueId')=="");
						if (getCookie('ligueId') == null || getCookie('ligueId') == "") {
							setCookie('ligueId', ligueId, 120);
							//							alert(getCookie('ligueId'));
						}
						//				alert(document.getElementById("tabResume").href);
						//alert(result.matchId);
						afficheResumeMatch(result);
						getJSONdeMatchID(result);
				},'json').fail(function(){
						alert("Erreur dans la récupération d'information du match");
					}
				);

				

			}

			function getChronoRel(periodes, chronoBut){
				chronoRel = new Array();
			for(var i=0;i<periodes.length;i++){
				if(chronoBut<periodes[i].chrono){
					//alert(chronoBut+'   ---   '+periodes[i].chrono);
					if(i==0){
						chronoRel.periode = periodes[0];
						chronoRel.chrono = parseInt(chronoBut)-parseInt(periodes[0].chrono);
						return chronoRel;
						}
					else{
						chronoRel.periode = periodes[i-1];
						chronoRel.chrono = parseInt(chronoBut)-parseInt(periodes[i-1].chrono);
						return chronoRel;
					}
				
				}
			}
				chronoRel.periode = periodes[periodes.length-1];
				chronoRel.chrono = parseInt(chronoBut)-parseInt(periodes[periodes.length-1].chrono);
				return chronoRel;
			
			}
